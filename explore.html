<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Explore Projects - TrustLaunch</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="launch.html">Launch</a>
  <a href="explore.html">Explore</a>
  <a href="wallet.html">Wallet</a>
  <a href="leaderboard.html">Leaderboard</a>
  <a href="halloffame.html">Hall of Fame</a>
</nav>

<h1>🚀 Explore Projects</h1>

<section>

  <h2>Community Launches</h2>

  <input
    id="searchInput"
    type="text"
    placeholder="Search token name or symbol"
    onkeyup="renderProjects()"
  >

  <br><br>

  <button onclick="setFilter('All')">All</button>
  <button onclick="setFilter('Meme')">Meme</button>
  <button onclick="setFilter('Safe')">Safe</button>
  <button onclick="setFilter('Pro')">Pro</button>

  <br><br>

  <select id="sortSelect" onchange="renderProjects()">
    <option value="newest">Newest</option>
    <option value="trust">Highest Trust Score</option>
    <option value="rank">Highest Rank Score</option>
    <option value="likes">Most Likes</option>
    <option value="views">Most Views</option>
  </select>

  <br><br>

  <div id="projectsContainer">
    <p>No projects found.</p>
  </div>

</section>

<footer>
  <p>TrustLaunch</p>
  <p>Build trust before hype.</p>
</footer>

<script>

const projects =
  JSON.parse(
    localStorage.getItem("projects")
  ) || [];

let currentFilter = "All";

function setFilter(filter) {

  currentFilter = filter;

  renderProjects();

}

function calculateRank(project) {

  const launches =
    projects.filter(
      p =>
      p.creatorWallet ===
      project.creatorWallet
    ).length;

  const reputation =
    Math.min(
      100,
      50 + launches * 10
    );

  const likes =
    Number(
      localStorage.getItem(
        "likes_" +
        project.tokenSymbol
      ) || 0
    );

  const views =
    Number(
      localStorage.getItem(
        "views_" +
        project.tokenSymbol
      ) || 0
    );

  return (
    Number(project.trustScore || 0) +
    reputation +
    (launches * 5) +
    likes +
    views
  );

}

function renderProjects() {

  const container =
    document.getElementById(
      "projectsContainer"
    );

  const search =
    document
      .getElementById(
        "searchInput"
      )
      .value
      .toLowerCase();

  const sortType =
    document.getElementById(
      "sortSelect"
    ).value;

  container.innerHTML = "";

  let filteredProjects =
    projects.filter(project => {

      const matchesSearch =

        project.tokenName
          .toLowerCase()
          .includes(search)

        ||

        project.tokenSymbol
          .toLowerCase()
          .includes(search);

      const matchesFilter =

        currentFilter === "All"

        ||

        project.launchType ===
        currentFilter;

      return (
        matchesSearch &&
        matchesFilter
      );

    });

  if (sortType === "newest") {

    filteredProjects.sort(
      (a,b) =>
        b.createdAt -
        a.createdAt
    );

  }

  if (sortType === "trust") {

    filteredProjects.sort(
      (a,b) =>
        Number(b.trustScore || 0) -
        Number(a.trustScore || 0)
    );

  }

  if (sortType === "rank") {

    filteredProjects.sort(
      (a,b) =>
        calculateRank(b) -
        calculateRank(a)
    );

  }

  if (sortType === "likes") {

    filteredProjects.sort(
      (a,b) =>

        Number(
          localStorage.getItem(
            "likes_" +
            b.tokenSymbol
          ) || 0
        )

        -

        Number(
          localStorage.getItem(
            "likes_" +
            a.tokenSymbol
          ) || 0
        )
    );

  }

  if (sortType === "views") {

    filteredProjects.sort(
      (a,b) =>

        Number(
          localStorage.getItem(
            "views_" +
            b.tokenSymbol
          ) || 0
        )

        -

        Number(
          localStorage.getItem(
            "views_" +
            a.tokenSymbol
          ) || 0
        )
    );

  }

  if (
    filteredProjects.length === 0
  ) {

    container.innerHTML =
      "<p>No projects found.</p>";

    return;

  }

  filteredProjects.forEach(project => {

    const launchTime =

      project.createdAt

      ?

      new Date(
        project.createdAt
      ).toLocaleString()

      :

      "Unknown";

    const launches =

      projects.filter(
        p =>
        p.creatorWallet ===
        project.creatorWallet
      ).length;

    const likes =
      Number(
        localStorage.getItem(
          "likes_" +
          project.tokenSymbol
        ) || 0
      );

    const views =
      Number(
        localStorage.getItem(
          "views_" +
          project.tokenSymbol
        ) || 0
      );

    const rankScore =
      calculateRank(project);

    let badge =
      "🚀 New";

    if (rankScore >= 170)
      badge = "⭐ Trusted";

    if (rankScore >= 200)
      badge = "🏆 Elite";

    container.innerHTML += `

      <div>

        <h3>
          ${badge}
          ${project.tokenName}
        </h3>

        <p>
          <strong>Symbol:</strong>
          ${project.tokenSymbol}
        </p>

        <p>
          <strong>Launch Type:</strong>
          ${project.launchType}
        </p>

        <p>
          <strong>Trust Score:</strong>
          ${project.trustScore}
        </p>

        <p>
          <strong>Rank Score:</strong>
          ${rankScore}
        </p>

        <p>
          <strong>Likes:</strong>
          ${likes}
        </p>

        <p>
          <strong>Views:</strong>
          ${views}
        </p>

        <p>
          <strong>Founder Launches:</strong>
          ${launches}
        </p>

        <p>
          <strong>Launch Date:</strong>
          ${launchTime}
        </p>

        <button
          onclick='viewProject(
            ${JSON.stringify(project)}
          )'
        >
          View Project
        </button>

        <hr>

      </div>

    `;

  });

}

function viewProject(project) {

  localStorage.setItem(
    "selectedProject",
    JSON.stringify(project)
  );

  window.location.href =
    "project.html";

}

renderProjects();

</script>

</body>
</html>
