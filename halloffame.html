<h1>🏛️ Hall of Fame</h1>

<section>
  <h2>🌟 Top Projects</h2>
  <div id="hallProjects">
    <p>Loading...</p>
  </div>
</section>

<section>
  <h2>👑 Top Founders</h2>
  <div id="hallFounders">
    <p>Loading...</p>
  </div>
</section>

<script>

/* =========================
   SUPABASE
========================= */

const supabase = window.supabase.createClient(
  "https://uyuokduxqjghmqypheyi.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5dW9rZHV4cWpnaG1xeXBoZXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDgwMDAsImV4cCI6MjA5NjE4NDAwMH0.1RIJxhyo3Nrjn52qtSP3WTJTDqFT9UayRmaBSUwkZVw"
);

/* =========================
   HALL SCORE ENGINE
========================= */

function projectScore(p) {

  const likes = Number(p.likes || 0);
  const views = Number(p.views || 0);
  const trust = Number(p.trust_score || 0);

  const created = new Date(p.created_at || Date.now());
  const ageDays = Math.max(1, (Date.now() - created.getTime()) / (1000 * 60 * 60 * 24));

  const decay = 1 / Math.sqrt(ageDays);

  return (likes * 4 + views * 0.5 + trust * 2) * decay;
}

/* =========================
   LOAD ALL DATA
========================= */

async function loadHall() {

  const { data, error } = await supabase
    .from("launches")
    .select("*");

  if (error) {
    document.getElementById("hallProjects").innerHTML =
      "<p>Error loading data</p>";
    return;
  }

  const projects = data || [];

  renderProjects(projects);
  renderFounders(projects);
}

/* =========================
   TOP PROJECTS
========================= */

function renderProjects(projects) {

  const ranked = projects
    .map(p => ({
      ...p,
      score: projectScore(p)
    }))
    .sort((a, b) => b.score - a.score)
    .slice(0, 10);

  const container = document.getElementById("hallProjects");
  container.innerHTML = "";

  ranked.forEach((p, i) => {

    let medal = "🏅";
    if (i === 0) medal = "🥇";
    else if (i === 1) medal = "🥈";
    else if (i === 2) medal = "🥉";

    container.innerHTML += `
      <div>
        <h3>${medal} ${p.token_name}</h3>

        <p><strong>Symbol:</strong> ${p.token_symbol}</p>
        <p><strong>Score:</strong> ${Math.floor(p.score)}</p>
        <p><strong>Trust:</strong> ${p.trust_score}</p>
        <p><strong>Likes:</strong> ${p.likes}</p>
        <p><strong>Views:</strong> ${p.views}</p>

        <hr>
      </div>
    `;
  });
}

/* =========================
   TOP FOUNDERS
========================= */

function renderFounders(projects) {

  const founders = {};

  projects.forEach(p => {

    const wallet = p.creator_wallet;
    if (!wallet) return;

    if (!founders[wallet]) {
      founders[wallet] = {
        launches: 0,
        trust: 0,
        likes: 0,
        views: 0
      };
    }

    founders[wallet].launches++;
    founders[wallet].trust += Number(p.trust_score || 0);
    founders[wallet].likes += Number(p.likes || 0);
    founders[wallet].views += Number(p.views || 0);
  });

  const ranked = Object.entries(founders)
    .map(([wallet, d]) => {

      const score =
        d.trust +
        (d.likes * 2) +
        (d.views * 0.5) +
        (d.launches * 20);

      return {
        wallet,
        ...d,
        score
      };
    })
    .sort((a, b) => b.score - a.score)
    .slice(0, 10);

  const container = document.getElementById("hallFounders");
  container.innerHTML = "";

  ranked.forEach((f, i) => {

    let badge = "⭐ Founder";
    if (f.launches >= 5) badge = "🏆 Trusted Founder";
    if (f.launches >= 10) badge = "👑 Elite Founder";
    if (f.launches >= 25) badge = "🔥 Legendary Founder";

    container.innerHTML += `
      <div>
        <h3>${i + 1}. ${badge}</h3>

        <p><strong>Wallet:</strong> ${f.wallet}</p>
        <p><strong>Launches:</strong> ${f.launches}</p>
        <p><strong>Score:</strong> ${Math.floor(f.score)}</p>

        <hr>
      </div>
    `;
  });
}

/* INIT */
loadHall();

</script>

</body>
</html>
