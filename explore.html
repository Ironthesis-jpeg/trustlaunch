<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Explore Projects - TrustLaunch</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="launch.html">Launch</a>
  <a href="explore.html">Explore</a>
  <a href="wallet.html">Wallet</a>
  <a href="leaderboard.html">Leaderboard</a>
  <a href="halloffame.html">Hall of Fame</a>
  <a href="trending.html">Trending</a>
  <a href="notifications.html">Notifications</a>
  <a href="watchlist.html">Watchlist</a>
</nav>

<h1>🚀 Explore Projects</h1>

<section>

<input id="searchInput" type="text"
placeholder="Search token name or symbol"
onkeyup="renderProjects()">

<br><br>

<button onclick="setFilter('All')">All</button>
<button onclick="setFilter('Meme')">Meme</button>
<button onclick="setFilter('Safe')">Safe</button>
<button onclick="setFilter('Pro')">Pro</button>

<br><br>

<select id="sortSelect" onchange="renderProjects()">
  <option value="newest">Newest</option>
  <option value="trust">Trust Score</option>
  <option value="rank">Rank Score</option>
  <option value="likes">Likes</option>
  <option value="views">Views</option>
</select>

<br><br>

<div id="projectsContainer">
  <p>No projects found.</p>
</div>

</section>

<footer>
  <p>TrustLaunch</p>
</footer>

<script>

/* =========================
   LOAD PROJECTS
========================= */

const projects =
  JSON.parse(localStorage.getItem("projects")) || [];

let currentFilter = "All";
let lastRenderedList = [];

function setFilter(filter) {
  currentFilter = filter;
  renderProjects();
}

/* =========================
   NORMALIZE DATA
========================= */

function normalize(p) {
  return {
    token_name: p.token_name || p.tokenName,
    token_symbol: p.token_symbol || p.tokenSymbol,
    launch_type: p.launch_type || p.launchType,
    trust_score: p.trust_score || p.trustScore,
    creator_wallet:
  p.creator_wallet ||
  p.creatorWallet ||
  p.creator_wallet_address ||
  localStorage.getItem("walletAddress") ||
  "Unknown",
    created_at: p.created_at || p.createdAt,
    raw: p
  };
}

/* =========================
   RANK CALCULATION
========================= */

function calculateRank(project) {

  const launches =
    projects.filter(p =>
      (p.creator_wallet || p.creatorWallet) ===
      (project.creator_wallet || project.creatorWallet)
    ).length;

  const reputation = Math.min(100, 50 + launches * 10);

  const likes =
    Number(localStorage.getItem("likes_" + project.token_symbol) || 0);

  const views =
    Number(localStorage.getItem("views_" + project.token_symbol) || 0);

  return (
    Number(project.trust_score || 0) +
    reputation +
    launches * 5 +
    likes +
    views
  );
}

/* =========================
   VIEW PROJECT SAFE
========================= */

function viewProject(index) {

  const project = lastRenderedList[index];

  localStorage.setItem(
    "selectedProject",
    JSON.stringify(project)
  );

  window.location.href = "project.html";
}

/* =========================
   RENDER PROJECTS
========================= */

function renderProjects() {

  const container = document.getElementById("projectsContainer");
  const search = document.getElementById("searchInput").value.toLowerCase();
  const sortType = document.getElementById("sortSelect").value;

  container.innerHTML = "";

  let list = projects.map(normalize);

  list = list.filter(p => {

    const matchesSearch =
      (p.token_name || "").toLowerCase().includes(search) ||
      (p.token_symbol || "").toLowerCase().includes(search);

    const matchesFilter =
      currentFilter === "All" ||
      p.launch_type === currentFilter;

    return matchesSearch && matchesFilter;
  });

  /* store safe list for navigation */
  lastRenderedList = list.map(p => p.raw);

  /* sorting */
  if (sortType === "newest") {
    list.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  }

  if (sortType === "trust") {
    list.sort((a,b) => (b.trust_score || 0) - (a.trust_score || 0));
  }

  if (sortType === "rank") {
    list.sort((a,b) => calculateRank(b.raw) - calculateRank(a.raw));
  }

  if (sortType === "likes") {
    list.sort((a,b) =>
      Number(localStorage.getItem("likes_" + b.token_symbol) || 0) -
      Number(localStorage.getItem("likes_" + a.token_symbol) || 0)
    );
  }

  if (sortType === "views") {
    list.sort((a,b) =>
      Number(localStorage.getItem("views_" + b.token_symbol) || 0) -
      Number(localStorage.getItem("views_" + a.token_symbol) || 0)
    );
  }

  if (list.length === 0) {
    container.innerHTML = "<p>No projects found.</p>";
    return;
  }

  list.forEach((p, i) => {

    const likes =
      Number(localStorage.getItem("likes_" + p.token_symbol) || 0);

    const views =
      Number(localStorage.getItem("views_" + p.token_symbol) || 0);

    const rank = calculateRank(p.raw);

    let badge = "🚀 New";
    if (rank >= 200) badge = "🏆 Elite";
    else if (rank >= 170) badge = "⭐ Trusted";

    container.innerHTML += `
      <div>
        <h3>${badge} ${p.token_name}</h3>

        <p><strong>Symbol:</strong> ${p.token_symbol}</p>
        <p><strong>Type:</strong> ${p.launch_type}</p>
        <p><strong>Trust:</strong> ${p.trust_score}</p>
        <p><strong>Rank:</strong> ${rank}</p>
        <p><strong>Likes:</strong> ${likes}</p>
        <p><strong>Views:</strong> ${views}</p>

        <button onclick="viewProject(${i})">
          View Project
        </button>

        <hr>
      </div>
    `;
  });
}

renderProjects();

</script>

</body>
</html>
