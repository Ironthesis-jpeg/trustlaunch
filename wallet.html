<!DOCTYPE html><html>
<head>
  <title>Wallet - TrustLaunch</title>
  <link rel="stylesheet" href="styles.css">
</head><body><nav>
  <a href="index.html">Home</a>
  <a href="launch.html">Launch</a>

  <a href="wallet.html">Wallet</a>
</nav><h1>Wallet</h1><section>  <h2>Connect Wallet</h2>  <p id="walletAddress">
    No wallet connected.
  </p>  <button onclick="connectWallet()">
    Connect Wallet
  </button></section><footer>
  <p>TrustLaunch</p>
  <p>Build trust before hype.</p>
</footer><script>

function connectWallet() {

  const wallet =
    "0x" +
    Math.random()
      .toString(16)
      .substring(2, 10);

  localStorage.setItem(
    "walletAddress",
    wallet
  );

  loadWallet();
}

function loadWallet() {

  const wallet =
    localStorage.getItem("walletAddress");

  if (wallet) {

    document.getElementById(
      "walletAddress"
    ).textContent =
      "Connected: " + wallet;

  }
}

loadWallet();

</script></body>
</html>
