<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Project Details - TrustLaunch</title>

<link rel="stylesheet" href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/@metamask/detect-provider"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="wallet.js"></script>

</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="launch.html">Launch</a>
  <a href="explore.html">Explore</a>
  <a href="wallet.html">Wallet</a>
  <a href="trending.html">Trending</a>

  <button onclick="connectWallet()">
    Connect Wallet
  </button>

  <span id="walletDisplay">
    Not Connected
  </span>
</nav>

<h1>🚀 Project</h1>

<section>

  <h2 id="title">Loading...</h2>

  <p><strong>Symbol:</strong> <span id="symbol"></span></p>

  <p><strong>Trust Score:</strong>
    <span id="trust">0</span>
  </p>

  <p><strong>Green Flags:</strong>
    <span id="greenFlags">0</span>
  </p>

  <p><strong>Red Flags:</strong>
    <span id="redFlags">0</span>
  </p>

  <p><strong>Contract:</strong>
    <span id="contract">N/A</span>
  </p>

  <p><strong>Transaction:</strong>
    <span id="txhash">N/A</span>
  </p>

  <br>

  <button id="greenBtn">
    🟢 Green Flag
  </button>

  <button id="redBtn">
    🔴 Red Flag
  </button>

  <p id="voteStatus"></p>

</section>

<script>

/* =========================
   SUPABASE
========================= */

const supabase = window.supabase.createClient(
  "https://uyuokduxqjghmqypheyi.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5dW9rZHV4cWpnaG1xeXBoZXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDgwMDAsImV4cCI6MjA5NjE4NDAwMH0.1RIJxhyo3Nrjn52qtSP3WTJTDqFT9UayRmaBSUwkZVw"
);

/* =========================
   PROJECT
========================= */

const savedProject =
JSON.parse(
  localStorage.getItem("selectedProject")
);

if (!savedProject) {

  document.body.innerHTML =
  "<h2>No project found</h2>";

  throw new Error("No project");
}

let currentProject = savedProject;

/* =========================
   TRUST CALC
========================= */

function calculateTrust(
  green,
  red
) {

  green = Number(green || 0);
  red = Number(red || 0);

  const total =
    green + red;

  if (total === 0) {
    return 50;
  }

  return Math.round(
    (green / total) * 100
  );
}

/* =========================
   RENDER
========================= */

function renderProject() {

  document.getElementById("title")
    .textContent =
    currentProject.token_name || "";

  document.getElementById("symbol")
    .textContent =
    currentProject.token_symbol || "";

  document.getElementById("greenFlags")
    .textContent =
    currentProject.green_flags || 0;

  document.getElementById("redFlags")
    .textContent =
    currentProject.red_flags || 0;

  document.getElementById("contract")
    .textContent =
    currentProject.contract_address ||
    "N/A";

  document.getElementById("txhash")
    .textContent =
    currentProject.tx_hash ||
    "N/A";

  document.getElementById("trust")
    .textContent =
    calculateTrust(
      currentProject.green_flags,
      currentProject.red_flags
    );
}

/* =========================
   LOAD LATEST PROJECT
========================= */

async function loadProject() {

  const { data } =
  await supabase
    .from("launches")
    .select("*")
    .eq("id", currentProject.id)
    .single();

  if (data) {
    currentProject = data;
  }

  renderProject();
}

/* =========================
   FLAG VOTE
========================= */

async function submitVote(
  type
) {

  const wallet =
    localStorage.getItem(
      "walletAddress"
    );

  if (!wallet) {

    alert(
      "Connect wallet first"
    );

    return;
  }

  const status =
    document.getElementById(
      "voteStatus"
    );

  try {

    const { error: voteError } =
      await supabase
      .from("project_flags")
      .insert([
        {
          project_id:
            currentProject.id,

          wallet:
            wallet,

          flag_type:
            type
        }
      ]);

    if (voteError) {

      alert(
        "You already voted on this project"
      );

      return;
    }

    let green =
      Number(
        currentProject.green_flags || 0
      );

    let red =
      Number(
        currentProject.red_flags || 0
      );

    if (type === "green") {
      green++;
    }

    if (type === "red") {
      red++;
    }

    const trust =
      calculateTrust(
        green,
        red
      );

    const { error } =
      await supabase
      .from("launches")
      .update({
        green_flags: green,
        red_flags: red,
        trust_score: trust
      })
      .eq(
        "id",
        currentProject.id
      );

    if (error) {
      throw error;
    }

    currentProject.green_flags =
      green;

    currentProject.red_flags =
      red;

    currentProject.trust_score =
      trust;

    renderProject();

    status.textContent =
      "Vote recorded";

  } catch (err) {

    console.error(err);

    status.textContent =
      "Vote failed";
  }
}

/* =========================
   BUTTONS
========================= */

document
.getElementById("greenBtn")
.onclick = () =>
submitVote("green");

document
.getElementById("redBtn")
.onclick = () =>
submitVote("red");

/* =========================
   INIT
========================= */

loadProject();

</script>

</body>
</html>
