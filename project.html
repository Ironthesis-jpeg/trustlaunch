<head>
  <title>Project Details - TrustLaunch</title>
  <link rel="stylesheet" href="styles.css">
</head><body><nav>

  <a href="launch.html">Launch</a>
  <a href="explore.html">Explore</a>
  <a href="wallet.html">Wallet</a>
</nav><h1>Project Details</h1><section>  <p><strong>Token Name:</strong> <span id="tokenName"></span></p>  <p><strong>Token Symbol:</strong> <span id="tokenSymbol"></span></p>  <p><strong>Launch Type:</strong> <span id="launchType"></span></p>  <p><strong>Total Supply:</strong> <span id="totalSupply"></span></p>  <p><strong>Creator Fee:</strong> <span id="creatorFee"></span></p>  <p><strong>Trust Score:</strong> <span id="trustScore"></span></p>  <p><strong>Creator Wallet:</strong> <span id="creatorWallet"></span></p>  <p><strong>Launch Date:</strong> <span id="launchDate"></span></p>  <p><strong>Founder Reputation:</strong> 95</p>  <p><strong>Status:</strong> Active</p></section><footer>
  <p>TrustLaunch</p>
  <p>Build trust before hype.</p>
</footer><script>

const project =
  JSON.parse(localStorage.getItem("selectedProject"));

if (project) {

  document.getElementById("tokenName").textContent =
    project.tokenName;

  document.getElementById("tokenSymbol").textContent =
    project.tokenSymbol;

  document.getElementById("launchType").textContent =
    project.launchType;

  document.getElementById("totalSupply").textContent =
    project.totalSupply;

  document.getElementById("creatorFee").textContent =
    project.creatorFee;

  document.getElementById("trustScore").textContent =
    project.trustScore;

  document.getElementById("creatorWallet").textContent =
    project.creatorWallet || "Unknown";

  document.getElementById("launchDate").textContent =
    project.createdAt
      ? new Date(project.createdAt).toLocaleString()
      : "Unknown";
}

</script></body>
</html>
