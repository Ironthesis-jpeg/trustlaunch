<script>
const supabaseUrl = "https://uyuokduxqjghmqypheyi.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5dW9rZHV4cWpnaG1xeXBoZXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDgwMDAsImV4cCI6MjA5NjE4NDAwMH0.1RIJxhyo3Nrjn52qtSP3WTJTDqFT9UayRmaBSUwkZVw";

const supabaseClient =
  window.supabase.createClient(supabaseUrl, supabaseKey);

/* =========================
   WALLET CHECK (IMPORTANT FIX)
========================= */

function getWallet() {
  const wallet = localStorage.getItem("walletAddress");

  if (!wallet || wallet === "Not Connected") {
    return null;
  }

  return wallet;
}

/* =========================
   FORM HANDLER
========================= */

window.reviewLaunch = function(event) {
  event.preventDefault();

  const wallet = getWallet();

  if (!wallet) {
    alert("Please connect your wallet before launching a project.");
    return;
  }

  const tokenName = document.getElementById("tokenName").value.trim();
  const tokenSymbol = document.getElementById("tokenSymbol").value.trim();
  const projectDescription = document.getElementById("projectDescription").value.trim();
  const projectWebsite = document.getElementById("projectWebsite").value.trim();
  const projectTwitter = document.getElementById("projectTwitter").value.trim();
  const projectLogo = document.getElementById("projectLogo").value.trim();
  const projectCategory = document.getElementById("projectCategory").value;
  const launchType = document.getElementById("launchType").value;
  const totalSupplyRaw = document.getElementById("totalSupply").value;
  const creatorFee = document.getElementById("creatorFee").value;

  /* =========================
     VALIDATION
  ========================= */

  if (!tokenName || !tokenSymbol) {
    alert("Token Name and Symbol are required.");
    return;
  }

  if (!totalSupplyRaw || Number(totalSupplyRaw) <= 0) {
    alert("Invalid total supply.");
    return;
  }

  const totalSupply = Number(totalSupplyRaw);

  /* =========================
     STRUCTURED PROJECT OBJECT
  ========================= */

  const pendingProject = {
    tokenName,
    tokenSymbol,
    projectDescription: projectDescription || "",
    projectWebsite: projectWebsite || "",
    projectTwitter: projectTwitter || "",
    projectLogo: projectLogo || "",
    projectCategory,
    launchType,
    totalSupply,
    creatorFee: Number(creatorFee),
    creatorWallet: wallet,
    createdAt: Date.now(),
    trustScore: 100
  };

  /* =========================
     SAVE + REDIRECT
  ========================= */

  localStorage.setItem("pendingProject", JSON.stringify(pendingProject));

  window.location.href = "review.html";
};
</script>

<h1>🚀 Launch Token</h1>

<label>Token Name</label><br>
<input id="tokenName" type="text" placeholder="Wolf Coin"><br><br>

<label>Token Symbol</label><br>
<input id="tokenSymbol" type="text" placeholder="WOLF"><br><br>

<label>Project Description</label><br>
<textarea id="projectDescription" placeholder="Describe your project..."></textarea><br><br>

<label>Website</label><br>
<input id="projectWebsite" type="text" placeholder="https://yourproject.com"><br><br>

<label>X / Twitter</label><br>
<input id="projectTwitter" type="text" placeholder="https://x.com/yourproject"><br><br>

<label>Logo URL</label><br>
<input id="projectLogo" type="text" placeholder="https://..."><br><br>

<label>Category</label><br>
<select id="projectCategory">
  <option>Meme</option>
  <option>AI</option>
  <option>DeFi</option>
  <option>Gaming</option>
  <option>Infrastructure</option>
  <option>SocialFi</option>
  <option>Utility</option>
</select><br><br>

<label>Launch Type</label><br>
<select id="launchType">
  <option>Meme</option>
  <option>Safe</option>
  <option>Pro</option>
</select><br><br>

<label>Total Supply</label><br>
<input id="totalSupply" type="number" placeholder="1000000000"><br>

<p>
Meme: 100B - 1T<br>
Safe: 1B - 1T<br>
Pro: 100M - 100B
</p>

<label>Creator Fee</label><br>
<select id="creatorFee">
  <option value="0">0%</option>
  <option value="1">1%</option>
  <option value="2">2%</option>
</select>

<p>
Creator Fee applies only to buys and sells.<br>
No fee on transfers.
</p>

<button type="submit">
  Review Launch
</button>

</form>

<footer>
  <p>TrustLaunch</p>
  <p>Build trust before hype.</p>
</footer>
