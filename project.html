<!DOCTYPE html>
<html>
<head>

<script src="https://cdn.jsdelivr.net/npm/@metamask/detect-provider"></script>
<script src="wallet.js"></script>

<meta charset="UTF-8">
<title>Project Details - TrustLaunch</title>

<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="launch.html">Launch</a>
  <a href="explore.html">Explore</a>
  <a href="wallet.html">Wallet</a>
  <a href="trending.html">Trending</a>

  <button onclick="connectWallet()">Connect Wallet</button>

  <span id="walletDisplay" style="margin-left:10px;">
    Not Connected
  </span>
</nav>

<h1>🚀 Project</h1>

<section>
  <h2 id="title">Loading...</h2>

  <p>Symbol: <span id="symbol"></span></p>
  <p>Trust: <span id="trust"></span></p>
  <p>Likes: <span id="likes">0</span></p>
  <p>Views: <span id="views">0</span></p>

  <button id="likeBtn">❤️ Like</button>
</section>

<hr>

<section>
  <h2>💬 Comments</h2>

  <input id="commentInput" placeholder="Write a comment">
  <button onclick="postComment()">Post</button>

  <div id="comments"></div>
</section>

<script>

/* =========================
   SUPABASE
========================= */

const supabase = window.supabase.createClient(
  "https://uyuokduxqjghmqypheyi.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5dW9rZHV4cWpnaG1xeXBoZXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDgwMDAsImV4cCI6MjA5NjE4NDAwMH0.1RIJxhyo3Nrjn52qtSP3WTJTDqFT9UayRmaBSUwkZVw"
);

/* =========================
   LOAD PROJECT SAFELY
========================= */

let project = JSON.parse(localStorage.getItem("selectedProject"));

if (!project) {
  document.body.innerHTML = "<h2>No project found</h2>";
}

let currentProject = project;

/* =========================
   FETCH LATEST FROM SUPABASE
========================= */

async function loadProject() {

  const { data } = await supabase
    .from("launches")
    .select("*")
    .eq("id", currentProject.id)
    .single();

  if (data) {
    currentProject = data;
  }

  renderProject();
  trackView();
  loadComments();
}

/* =========================
   VIEW TRACKING (ONCE PER SESSION)
========================= */

async function trackView() {

  const viewKey = "view_" + currentProject.id;

  if (sessionStorage.getItem(viewKey)) return;

  let views = Number(currentProject.views || 0);
  views++;

  await supabase
    .from("launches")
    .update({ views })
    .eq("id", currentProject.id);

  currentProject.views = views;

  sessionStorage.setItem(viewKey, "true");

  document.getElementById("views").textContent = views;
}

/* =========================
   RENDER PROJECT
========================= */

function renderProject() {

  document.getElementById("title").textContent =
    currentProject.token_name;

  document.getElementById("symbol").textContent =
    currentProject.token_symbol;

  document.getElementById("trust").textContent =
    currentProject.trust_score;

  document.getElementById("likes").textContent =
    currentProject.likes || 0;

  document.getElementById("views").textContent =
    currentProject.views || 0;
}

/* =========================
   LIKE BUTTON (REAL DB)
========================= */

document.getElementById("likeBtn").onclick = async () => {

  let likes = Number(currentProject.likes || 0);
  likes++;

  currentProject.likes = likes;

  document.getElementById("likes").textContent = likes;

  await supabase
    .from("launches")
    .update({ likes })
    .eq("id", currentProject.id);

};

/* =========================
   COMMENTS
========================= */

async function loadComments() {

  const { data } = await supabase
    .from("comments")
    .select("*")
    .eq("project_id", currentProject.id)
    .order("created_at", { ascending: false });

  renderComments(data || []);
}

async function postComment() {

  const input = document.getElementById("commentInput");
  const text = input.value.trim();

  if (!text) return;

  const wallet = localStorage.getItem("walletAddress") || "anon";

  await supabase
    .from("comments")
    .insert([{
      project_id: currentProject.id,
      wallet,
      message: text
    }]);

  input.value = "";
  loadComments();
}

function renderComments(comments) {

  const container = document.getElementById("comments");
  container.innerHTML = "";

  if (!comments.length) {
    container.innerHTML = "<p>No comments yet</p>";
    return;
  }

  comments.forEach(c => {

    container.innerHTML += `
      <div style="margin-bottom:10px">
        <b>${c.wallet}</b>
        <p>${c.message}</p>
        <small>${new Date(c.created_at).toLocaleString()}</small>
        <hr>
      </div>
    `;
  });
}

/* =========================
   INIT
========================= */

loadProject();

</script>

</body>
</html>
