<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Explore Projects - TrustLaunch</title>

<link rel="stylesheet" href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/@metamask/detect-provider"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="wallet.js"></script>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="launch.html">Launch</a>
  <a href="explore.html">Explore</a>
  <a href="wallet.html">Wallet</a>
  <a href="trending.html">Trending</a>

  <button onclick="connectWallet()">Connect Wallet</button>

  <span id="walletDisplay" style="margin-left:10px;">
    Not Connected
  </span>
</nav>

<h1>🚀 Explore Projects</h1>

<section>

  <input id="searchInput"
    type="text"
    placeholder="Search token name or symbol"
    onkeyup="renderProjects()">

  <br><br>

  <button onclick="setFilter('All')">All</button>
  <button onclick="setFilter('Meme')">Meme</button>
  <button onclick="setFilter('Safe')">Safe</button>
  <button onclick="setFilter('Pro')">Pro</button>

  <button onclick="setSort('newest')">Newest</button>
  <button onclick="setSort('trending')">Trending</button>

</section>

<hr>

<section>
  <div id="projectsContainer">
    <p>Loading projects...</p>
  </div>
</section>

<script>

/* =========================
   SUPABASE SETUP
========================= */

const supabase = window.supabase.createClient(
  "https://uyuokduxqjghmqypheyi.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5dW9rZHV4cWpnaG1xeXBoZXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDgwMDAsImV4cCI6MjA5NjE4NDAwMH0.1RIJxhyo3Nrjn52qtSP3WTJTDqFT9UayRmaBSUwkZVw"
);

/* =========================
   STATE
========================= */

let projects = [];
let currentFilter = "All";
let currentSort = "newest";

/* =========================
   LOAD PROJECTS
========================= */

async function loadProjects() {

  const { data, error } = await supabase
    .from("launches")
    .select("*");

  if (error) {
    document.getElementById("projectsContainer").innerHTML =
      "<p>Error loading projects</p>";
    return;
  }

  projects = data || [];
  renderProjects();
}

/* =========================
   FILTER
========================= */

function setFilter(f) {
  currentFilter = f;
  renderProjects();
}

/* =========================
   SORT
========================= */

function setSort(type) {
  currentSort = type;
  renderProjects();
}

/* =========================
   SAFE NAVIGATION
========================= */

function viewProject(project) {
  localStorage.setItem("selectedProject", JSON.stringify(project));
  window.location.href = "project.html";
}

/* =========================
   RENDER
========================= */

function renderProjects() {

  const container = document.getElementById("projectsContainer");
  const search = document.getElementById("searchInput").value.toLowerCase();

  let list = [...projects];

  /* FILTER */
  list = list.filter(p => {

    const name = (p.token_name || "").toLowerCase();
    const symbol = (p.token_symbol || "").toLowerCase();

    const matchesSearch =
      name.includes(search) || symbol.includes(search);

    const matchesFilter =
      currentFilter === "All" ||
      p.launch_type === currentFilter;

    return matchesSearch && matchesFilter;
  });

  /* SORT */
  if (currentSort === "newest") {
    list.sort((a, b) =>
      new Date(b.created_at) - new Date(a.created_at)
    );
  }

  if (currentSort === "trending") {
    list.sort((a, b) =>
      (b.trending_score || 0) - (a.trending_score || 0)
    );
  }

  /* EMPTY STATE */
  if (list.length === 0) {
    container.innerHTML = "<p>No projects found</p>";
    return;
  }

  container.innerHTML = "";

  /* RENDER */
  list.forEach(p => {

    const score =
      (p.likes || 0) +
      (p.views || 0) +
      (p.trust_score || 0);

    const encoded = encodeURIComponent(JSON.stringify(p));

    container.innerHTML += `
      <div class="project-card">

        <h3>🚀 ${p.token_name}</h3>

        <p><strong>Symbol:</strong> ${p.token_symbol}</p>
        <p><strong>Type:</strong> ${p.launch_type}</p>
        <p><strong>Trust:</strong> ${p.trust_score}</p>
        <p><strong>Likes:</strong> ${p.likes}</p>
        <p><strong>Views:</strong> ${p.views}</p>
        <p><strong>Score:</strong> ${score}</p>

        <button onclick="openProject('${encoded}')">
          View Project
        </button>

        <hr>
      </div>
    `;
  });
}

/* =========================
   SAFE PROJECT OPEN
========================= */

function openProject(encoded) {
  const project = JSON.parse(decodeURIComponent(encoded));
  viewProject(project);
}

/* INIT */
loadProjects();

</script>

</body>
</html>
