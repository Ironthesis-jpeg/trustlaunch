<!DOCTYPE html>
<html>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="launch.html">Launch</a>
  <a href="explore.html">Explore</a>
  <a href="wallet.html">Wallet</a>

  <button onclick="connectWallet()">
    Connect Wallet
  </button>

  <span id="walletDisplay" style="margin-left:10px;">
    Not Connected
  </span>

<h1>🚀 Launch Token</h1>

<form onsubmit="reviewLaunch(event)">

<label>Token Name</label><br>
<input id="tokenName" type="text" required><br><br>

<label>Token Symbol</label><br>
<input id="tokenSymbol" type="text" required><br><br>

<label>Description</label><br>
<textarea id="projectDescription"></textarea><br><br>

<label>Website</label><br>
<input id="projectWebsite"><br><br>

<label>Twitter</label><br>
<input id="projectTwitter"><br><br>

<label>Logo URL</label><br>
<input id="projectLogo"><br><br>

<label>Category</label><br>
<select id="projectCategory">
  <option value="Meme">Meme</option>
  <option value="AI">AI</option>
  <option value="DeFi">DeFi</option>
  <option value="Gaming">Gaming</option>
</select><br><br>

<label>Launch Type</label><br>
<select id="launchType">
  <option value="Meme">Meme</option>
  <option value="Safe">Safe</option>
  <option value="Pro">Pro</option>
</select><br><br>

<label>Total Supply</label><br>
<input id="totalSupply" type="number" required><br><br>

<label>Creator Fee (%)</label><br>
<select id="creatorFee">
  <option value="0">0%</option>
  <option value="1">1%</option>
  <option value="2">2%</option>
</select><br><br>

<button type="submit">Review Launch</button>

</form>

<script>
/* =========================
   SAFE SUPABASE INIT
========================= */

const supabaseUrl = "https://uyuokduxqjghmqypheyi.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5dW9rZHV4cWpnaG1xeXBoZXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDgwMDAsImV4cCI6MjA5NjE4NDAwMH0.1RIJxhyo3Nrjn52qtSP3WTJTDqFT9UayRmaBSUwkZVw";

/* IMPORTANT FIX: correct global usage */
const supabase = window.supabase
  ? window.supabase.createClient(supabaseUrl, supabaseKey)
  : null;

/* =========================
   WALLET
========================= */

function getWallet() {
  return localStorage.getItem("walletAddress");
}

/* =========================
   TRUST SCORE (BASE VERSION STEP 1)
========================= */

function calculateTrustScore(creatorFee) {

  let score = 100;

  if (creatorFee == 0) score = 100;
  else if (creatorFee == 1) score = 90;
  else if (creatorFee == 2) score = 70;

  return score;
}

/* =========================
   REVIEW LAUNCH
========================= */

window.reviewLaunch = function(e) {
  e.preventDefault();

  const wallet = getWallet();

  if (!wallet) {
    alert("Connect wallet first");
    return;
  }

  const creatorFee = Number(document.getElementById("creatorFee").value);

  const project = {
    token_name: document.getElementById("tokenName").value.trim(),
    token_symbol: document.getElementById("tokenSymbol").value.trim().toUpperCase(),
    description: document.getElementById("projectDescription").value,
    website: document.getElementById("projectWebsite").value,
    twitter: document.getElementById("projectTwitter").value,
    logo: document.getElementById("projectLogo").value,
    category: document.getElementById("projectCategory").value,
    launch_type: document.getElementById("launchType").value,
    total_supply: Number(document.getElementById("totalSupply").value),
    creator_fee: creatorFee,
    creator_wallet: wallet,

    /* CORE FIX: trust score must NOT be fake constant */
    trust_score: calculateTrustScore(creatorFee),

    views: 0,
    likes: 0,
    trending_score: 0,
    created_at: new Date().toISOString()
  };

  /* STEP 1 FLOW: still temporary storage (review step) */
  sessionStorage.setItem("pendingProject", JSON.stringify(project));

  window.location.href = "review.html";
};
</script>

</body>
