<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trending - TrustLaunch</title>

<link rel="stylesheet" href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="launch.html">Launch</a>
  <a href="explore.html">Explore</a>
  <a href="trending.html">Trending</a>
</nav>

<h1>🔥 Trending Projects</h1>

<div id="container">
  <p>Loading trending projects...</p>
</div>

<script>

/* =========================
   SUPABASE SETUP
========================= */

const supabaseUrl = "https://uyuokduxqjghmqypheyi.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5dW9rZHV4cWpnaG1xeXBoZXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDgwMDAsImV4cCI6MjA5NjE4NDAwMH0.1RIJxhyo3Nrjn52qtSP3WTJTDqFT9UayRmaBSUwkZVw"; // keep or replace with real anon key

const supabase = window.supabase.createClient(
  supabaseUrl,
  supabaseKey
);

/* =========================
   SAFE TREND SCORE ENGINE
========================= */

function calculateTrend(p) {

  const likes = Number(p.likes || 0);
  const views = Number(p.views || 0);
  const trust = Number(p.trust_score || 0);

  const created = new Date(p.created_at || Date.now());
  const ageHours = (Date.now() - created.getTime()) / (1000 * 60 * 60);

  const recencyBoost =
    ageHours < 24 ? 50 :
    ageHours < 72 ? 20 :
    0;

  return (
    likes * 3 +
    views * 0.5 +
    trust * 1.2 +
    recencyBoost
  );
}

/* =========================
   LOAD TRENDING FROM SUPABASE
========================= */

async function loadTrending() {

  const { data, error } = await supabase
    .from("launches")
    .select("*");

  if (error || !data) {
    document.getElementById("container").innerHTML =
      "<p>❌ Error loading trending projects</p>";
    return;
  }

  const list = data.map(p => ({
    ...p,
    trend_score: calculateTrend(p)
  }));

  list.sort((a, b) => b.trend_score - a.trend_score);

  render(list);
}

/* =========================
   SAFE NAVIGATION
========================= */

function openProject(p) {
  localStorage.setItem("selectedProject", JSON.stringify(p));
  window.location.href = "project.html";
}

/* =========================
   RENDER UI
========================= */

function render(list) {

  const container = document.getElementById("container");
  container.innerHTML = "";

  if (!list.length) {
    container.innerHTML = "<p>No trending projects yet</p>";
    return;
  }

  list.forEach((p) => {

    const name = p.token_name || "Unknown";
    const symbol = p.token_symbol || "N/A";
    const likes = p.likes || 0;
    const views = p.views || 0;
    const trust = p.trust_score || 0;

    let badge = "🚀 Hot";
    if (p.trend_score > 500) badge = "🔥 Viral";
    if (p.trend_score > 1000) badge = "👑 Legendary";

    const buttonId = `btn_${symbol}_${Math.floor(Math.random() * 10000)}`;

    container.innerHTML += `
      <div style="padding:12px; border-bottom:1px solid #333">

        <h3>${badge} ${name}</h3>

        <p><strong>Symbol:</strong> ${symbol}</p>
        <p><strong>Trend Score:</strong> ${p.trend_score.toFixed(2)}</p>

        <p><strong>Likes:</strong> ${likes}</p>
        <p><strong>Views:</strong> ${views}</p>
        <p><strong>Trust:</strong> ${trust}</p>

        <button id="${buttonId}">
          View Project
        </button>

      </div>
    `;

    setTimeout(() => {
      const btn = document.getElementById(buttonId);
      if (btn) {
        btn.onclick = () => openProject(p);
      }
    }, 0);

  });
}

/* =========================
   INIT
========================= */

loadTrending();

</script>

</body>
</html>
