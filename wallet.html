<!DOCTYPE html>
<html>
<head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="launch.html">Launch</a>
  <a href="explore.html">Explore</a>
  <a href="wallet.html">Wallet</a>
  <a href="trending.html">Trending</a>

  <!-- WALLET CONNECT BUTTON -->
  <button onclick="connectWallet()">
    Connect Wallet
  </button>

  <!-- SHOW CONNECTED WALLET -->
  <span id="walletDisplay" style="margin-left:10px;">
    Not Connected
  </span>
</nav>

<h1>🚀 Launch Token</h1>

<form onsubmit="launch(event)">

<input id="name" placeholder="Token Name"><br><br>
<input id="symbol" placeholder="Symbol"><br><br>
<textarea id="desc" placeholder="Description"></textarea><br><br>

<select id="type">
  <option>Meme</option>
  <option>Safe</option>
  <option>Pro</option>
</select><br><br>

<input id="supply" type="number" placeholder="Total Supply"><br><br>

<button type="submit">Launch</button>

</form>

<script>

const supabase = window.supabase.createClient(
  "https://uyuokduxqjghmqypheyi.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5dW9rZHV4cWpnaG1xeXBoZXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDgwMDAsImV4cCI6MjA5NjE4NDAwMH0.1RIJxhyo3Nrjn52qtSP3WTJTDqFT9UayRmaBSUwkZVw"
);

/* GET WALLET */
function getWallet() {
  return localStorage.getItem("walletAddress");
}

/* PROFILE AUTO CREATE */
async function ensureProfile(wallet) {

  const { data } = await supabase
    .from("profiles")
    .select("*")
    .eq("wallet", wallet)
    .single();

  if (!data) {
    await supabase
      .from("profiles")
      .insert([{
        wallet,
        username: "User_" + wallet.slice(0,6)
      }]);
  }
}

/* LAUNCH */
window.launch = async function(e) {
  e.preventDefault();

  const wallet = getWallet();
  if (!wallet) return alert("Connect wallet first");

  await ensureProfile(wallet);

  const project = {
    token_name: document.getElementById("name").value,
    token_symbol: document.getElementById("symbol").value,
    description: document.getElementById("desc").value,
    launch_type: document.getElementById("type").value,
    total_supply: Number(document.getElementById("supply").value),
    creator_wallet: wallet,
    trust_score: 100,
    likes: 0,
    views: 0
  };

  const { data, error } = await supabase
    .from("launches")
    .insert([project])
    .select()
    .single();

  if (error) {
    alert(error.message);
    return;
  }

  localStorage.setItem("selectedProject", JSON.stringify(data));

  window.location.href = "project.html";
};

</script>

</body>
</html>
