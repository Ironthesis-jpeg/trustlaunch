<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trending - TrustLaunch</title>

<link rel="stylesheet" href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="launch.html">Launch</a>
  <a href="explore.html">Explore</a>
  <a href="trending.html">Trending</a>
</nav>

<h1>🔥 Trending Projects</h1>

<div id="container">
  <p>Loading trending projects...</p>
</div>

<script>

/* =========================
   SUPABASE
========================= */

const supabaseUrl = "https://uyuokduxqjghmqypheyi.supabase.co";
const supabaseKey = "YOUR_ANON_KEY";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

/* =========================
   TREND SCORE
========================= */

function calculateTrend(p) {

  const likes = Number(p.likes || 0);
  const views = Number(p.views || 0);
  const trust = Number(p.trust_score || 0);

  const created = new Date(p.created_at || Date.now());
  const ageHours = (Date.now() - created) / (1000 * 60 * 60);

  const recencyBoost =
    ageHours < 24 ? 50 :
    ageHours < 72 ? 20 :
    0;

  return (
    likes * 3 +
    views * 0.5 +
    trust * 1.2 +
    recencyBoost
  );
}

/* =========================
   LOAD TRENDING
========================= */

async function loadTrending() {

  const { data, error } = await supabase
    .from("launches")
    .select("*");

  if (error) {
    document.getElementById("container").innerHTML =
      "Error loading trending";
    return;
  }

  let list = data || [];

  list.forEach(p => {
    p.trend_score = calculateTrend(p);
  });

  list.sort((a,b) => b.trend_score - a.trend_score);

  render(list);
}

/* =========================
   RENDER
========================= */

function render(list) {

  const container = document.getElementById("container");
  container.innerHTML = "";

  if (list.length === 0) {
    container.innerHTML = "<p>No trending projects yet</p>";
    return;
  }

  list.forEach(p => {

    let badge = "🚀 Hot";
    if (p.trend_score > 500) badge = "🔥 Viral";
    if (p.trend_score > 1000) badge = "👑 Legendary";

    container.innerHTML += `
      <div style="padding:10px; border-bottom:1px solid #333">

        <h3>${badge} ${p.token_name}</h3>

        <p><strong>Symbol:</strong> ${p.token_symbol}</p>
        <p><strong>Trend Score:</strong> ${p.trend_score.toFixed(2)}</p>

        <p><strong>Likes:</strong> ${p.likes || 0}</p>
        <p><strong>Views:</strong> ${p.views || 0}</p>
        <p><strong>Trust:</strong> ${p.trust_score}</p>

        <button onclick='openProject(${JSON.stringify(p)})'>
          View
        </button>

      </div>
    `;
  });
}

/* =========================
   OPEN PROJECT
========================= */

function openProject(p) {
  localStorage.setItem("selectedProject", JSON.stringify(p));
  window.location.href = "project.html";
}

/* INIT */
loadTrending();

</script>

</body>
</html>
