<script>

/* =========================
   SUPABASE
========================= */

const supabaseUrl =
"https://uyuokduxqjghmqypheyi.supabase.co";

const supabaseKey =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5dW9rZHV4cWpnaG1xeXBoZXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDgwMDAsImV4cCI6MjA5NjE4NDAwMH0.1RIJxhyo3Nrjn52qtSP3WTJTDqFT9UayRmaBSUwkZVw";

const supabaseClient =
window.supabase.createClient(
  supabaseUrl,
  supabaseKey
);

/* =========================
   LOAD PROJECT
========================= */

const project =
JSON.parse(
  sessionStorage.getItem("pendingProject")
);

if (!project) {
  alert("No pending project found.");
  window.location.href = "launch.html";
}

/* =========================
   WALLET
========================= */

const walletAddress =
localStorage.getItem("walletAddress") ||
"Builder Mode";

/* =========================
   DISPLAY DATA
========================= */

document.getElementById("name").textContent =
project.token_name || "";

document.getElementById("symbol").textContent =
project.token_symbol || "";

document.getElementById("desc").textContent =
project.description || "";

document.getElementById("category").textContent =
project.category || "";

document.getElementById("type").textContent =
project.launch_type || "";

document.getElementById("supply").textContent =
Number(
project.total_supply || 0
).toLocaleString();

document.getElementById("fee").textContent =
project.creator_fee + "%";

document.getElementById("web").textContent =
project.website || "N/A";

document.getElementById("tw").textContent =
project.twitter || "N/A";

document.getElementById("wallet").textContent =
walletAddress;

document.getElementById("date").textContent =
new Date().toLocaleString();

/* =========================
   CONFIRM LAUNCH
========================= */

document.getElementById(
  "confirmBtn"
).onclick = async function () {

  this.disabled = true;
  this.innerText = "Launching...";

  try {

    const { data, error } =
    await supabaseClient
      .from("launches")
      .insert([
        {
          token_name:
            project.token_name,

          token_symbol:
            project.token_symbol,

          description:
            project.description,

          website:
            project.website,

          twitter:
            project.twitter,

          logo:
            project.logo,

          category:
            project.category,

          launch_type:
            project.launch_type,

          total_supply:
            project.total_supply,

          creator_fee:
            project.creator_fee,

          creator_wallet:
            walletAddress,

          trust_score:
            project.trust_score,

          views: 0,

          likes: 0,

          trending_score: 0,

          created_at:
            new Date().toISOString()
        }
      ])
      .select()
      .single();

    if (error) throw error;

    localStorage.setItem(
      "selectedProject",
      JSON.stringify(data)
    );

    sessionStorage.removeItem(
      "pendingProject"
    );

    alert(
      "Launch successful 🚀"
    );

    window.location.href =
      "project.html";

  } catch (err) {

    console.error(err);

    alert(
      "Launch failed: " +
      err.message
    );

    this.disabled = false;

    this.innerText =
      "🚀 Confirm Launch";
  }
};

</script>
