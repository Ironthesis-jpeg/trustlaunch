<!DOCTYPE html><html>
<head>
  <title>Explore Projects - TrustLaunch</title>
  <link rel="stylesheet" href="styles.css">
</head><body><nav>
  <a href="index.html">Home</a>
  <a href="launch.html">Launch</a>
  <a href="explore.html">Explore</a>
  <a href="wallet.html">Wallet</a>
  <a href="leaderboard.html">Leaderboard</a>
</nav>
</nav><h1>Explore Projects</h1><section>  <h2>Community Launches</h2><input
id="searchInput"
type="text"
placeholder="Search by token name or symbol"
onkeyup="renderProjects()"

«»

<br><br>

<button onclick="setFilter('All')">All</button>
<button onclick="setFilter('Meme')">Meme</button>
<button onclick="setFilter('Safe')">Safe</button>
<button onclick="setFilter('Pro')">Pro</button>

<br><br>

  <div id="projectsContainer"></div></section><footer>
  <p>TrustLaunch</p>
  <p>Build trust before hype.</p>
</footer><script>

const projects =
  JSON.parse(localStorage.getItem("projects")) || [];

let currentFilter = "All";

function setFilter(filter) {
  currentFilter = filter;
  renderProjects();
}

function renderProjects() {

  const container =
    document.getElementById("projectsContainer");

  const search =
    document.getElementById("searchInput")
      .value
      .toLowerCase();

  container.innerHTML = "";

  const filteredProjects =
    projects.filter(project => {

      const matchesSearch =
        project.tokenName.toLowerCase().includes(search) ||
        project.tokenSymbol.toLowerCase().includes(search);

      const matchesFilter =
        currentFilter === "All" ||
        project.launchType === currentFilter;

      return matchesSearch && matchesFilter;

    });

  if (filteredProjects.length === 0) {

    container.innerHTML =
      "<p>No projects found.</p>";

    return;

  }

  filteredProjects
    .slice()
    .reverse()
    .forEach(project => {

      const launchTime =
        project.createdAt
          ? new Date(project.createdAt).toLocaleString()
          : "Unknown";

      const creatorProjects =
        projects.filter(p =>
          p.creatorWallet === project.creatorWallet
        ).length;

      container.innerHTML += `
        <div>

          <h3>🚀 ${project.tokenName}</h3>

          <p><strong>Symbol:</strong> ${project.tokenSymbol}</p>

          <p><strong>Launch Type:</strong> ${project.launchType}</p>

          <p><strong>Trust Score:</strong> ${project.trustScore}</p>

          <p><strong>Creator:</strong> ${project.creatorWallet || "Unknown"}</p>

          <p><strong>Projects Launched:</strong> ${creatorProjects}</p>

          <p><strong>Launch Date:</strong> ${launchTime}</p>

          <button onclick='viewProject(${JSON.stringify(project)})'>
            View Project
          </button>

        </div>

        <hr>
      `;

    });

}

function viewProject(project) {

  localStorage.setItem(
    "selectedProject",
    JSON.stringify(project)
  );

  window.location.href =
    "project.html";

}

renderProjects();

</script></body>
</html>
