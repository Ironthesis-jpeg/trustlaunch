<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Review Launch - TrustLaunch</title>

<link rel="stylesheet" href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="wallet.js"></script>
<script src="app.js"></script>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="launch.html">Launch</a>
  <a href="explore.html">Explore</a>
  <a href="wallet.html">Wallet</a>
  <a href="trending.html">Trending</a>

  <button onclick="connectWallet()">Connect Wallet</button>

  <span id="walletDisplay">Not Connected</span>
</nav>

<h1>🚀 Review Launch</h1>

<section id="reviewSection">

  <p><strong>Token Name:</strong> <span id="name"></span></p>
  <p><strong>Symbol:</strong> <span id="symbol"></span></p>
  <p><strong>Description:</strong> <span id="desc"></span></p>
  <p><strong>Category:</strong> <span id="category"></span></p>
  <p><strong>Launch Type:</strong> <span id="type"></span></p>
  <p><strong>Total Supply:</strong> <span id="supply"></span></p>
  <p><strong>Creator Fee:</strong> <span id="fee"></span></p>
  <p><strong>Website:</strong> <span id="web"></span></p>
  <p><strong>Twitter:</strong> <span id="tw"></span></p>
  <p><strong>Wallet:</strong> <span id="wallet"></span></p>
  <p><strong>Trust Score:</strong> <span id="trust"></span></p>
  <p><strong>Date:</strong> <span id="date"></span></p>

</section>

<hr>

<button onclick="window.location.href='launch.html'">
⬅ Back
</button>

<button id="confirmBtn">
🚀 Confirm Launch
</button>

<footer>
  <p>TrustLaunch</p>
</footer>

<script>
/* =========================
   SUPABASE INIT
========================= */

const supabaseUrl = "https://uyuokduxqjghmqypheyi.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5dW9rZHV4cWpnaG1xeXBoZXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDgwMDAsImV4cCI6MjA5NjE4NDAwMH0.1RIJxhyo3Nrjn52qtSP3WTJTDqFT9UayRmaBSUwkZVw";

const supabaseClient = window.supabase.createClient(
  supabaseUrl,
  supabaseKey
);

/* =========================
   LOAD PROJECT (SAFE)
========================= */

const project = JSON.parse(sessionStorage.getItem("pendingProject"));

if (!project) {
  alert("No pending project found.");
  window.location.href = "launch.html";
}

/* =========================
   WALLET (SOURCE OF TRUTH = LOCAL STORAGE)
========================= */

function getWallet() {
  return localStorage.getItem("walletAddress") || "Not Connected";
}

const walletAddress = getWallet();

/* =========================
   RENDER UI
========================= */

function set(id, value) {
  const el = document.getElementById(id);
  if (el) el.textContent = value ?? "";
}

set("name", project.token_name);
set("symbol", project.token_symbol);
set("desc", project.description);
set("category", project.category);
set("type", project.launch_type);
set("supply", Number(project.total_supply || 0).toLocaleString());
set("fee", (project.creator_fee || 0) + "%");
set("web", project.website || "N/A");
set("tw", project.twitter || "N/A");
set("wallet", walletAddress);
set("trust", project.trust_score || 0);
set("date", new Date(project.created_at || Date.now()).toLocaleString());

/* =========================
   CONFIRM LAUNCH (SAFE + FUTURE READY)
========================= */

const btn = document.getElementById("confirmBtn");

btn.onclick = async function () {

  if (!project) return;

  this.disabled = true;
  this.innerText = "Launching...";

  try {

    /* =========================
       1. VALIDATION (ANTI-BAD DATA)
    ========================= */

    if (!project.token_name || !project.token_symbol) {
      throw new Error("Invalid project data");
    }

    if (!walletAddress || walletAddress === "Not Connected") {
      throw new Error("Wallet not connected");
    }

    /* =========================
       2. SAVE TO SUPABASE
    ========================= */

    const { data, error } = await supabaseClient
      .from("projects")
      .insert([
        {
          ...project,
          creator_wallet: walletAddress
        }
      ])
      .select()
      .single();

    if (error) throw error;

    /* =========================
       3. FUTURE HOOK (BLOCKCHAIN READY)
       - reserved for TrustLaunchFactory
    ========================= */

    // await deployToContract(data);

    /* =========================
       4. CLEANUP
    ========================= */

    sessionStorage.removeItem("pendingProject");

    localStorage.setItem(
      "selectedProject",
      JSON.stringify(data)
    );

    alert("Launch successful 🚀");

    window.location.href = "project.html";

  } catch (err) {

    console.error(err);

    alert("Launch failed: " + err.message);

    this.disabled = false;
    this.innerText = "🚀 Confirm Launch";
  }
};
</script>

</body>
</html>
