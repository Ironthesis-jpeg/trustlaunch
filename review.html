<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Review Launch - TrustLaunch</title>

<link rel="stylesheet" href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>

<script src="wallet.js"></script>
<script src="contract.js"></script>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="launch.html">Launch</a>
  <a href="explore.html">Explore</a>
  <a href="wallet.html">Wallet</a>
  <a href="trending.html">Trending</a>

  <button onclick="connectWallet()">
    Connect Wallet
  </button>

  <span id="walletDisplay">
    Not Connected
  </span>
</nav>

<h1>🚀 Review Launch</h1>

<section>

  <p><strong>Token Name:</strong> <span id="name"></span></p>
  <p><strong>Symbol:</strong> <span id="symbol"></span></p>
  <p><strong>Description:</strong> <span id="desc"></span></p>
  <p><strong>Category:</strong> <span id="category"></span></p>
  <p><strong>Launch Type:</strong> <span id="type"></span></p>
  <p><strong>Total Supply:</strong> <span id="supply"></span></p>
  <p><strong>Creator Fee:</strong> <span id="fee"></span></p>
  <p><strong>Website:</strong> <span id="web"></span></p>
  <p><strong>Twitter:</strong> <span id="tw"></span></p>
  <p><strong>Wallet:</strong> <span id="wallet"></span></p>
  <p><strong>Date:</strong> <span id="date"></span></p>

  <p><strong>On-chain Status:</strong> <span id="chainStatus">Not deployed</span></p>

</section>

<hr>

<button onclick="window.location.href='launch.html'">
⬅ Back
</button>

<button id="confirmBtn">
🚀 Confirm Launch
</button>

<footer>
  <p>TrustLaunch</p>
</footer>

<script>

/* =========================
   SUPABASE
========================= */

const supabaseUrl =
"https://uyuokduxqjghmqypheyi.supabase.co";

const supabaseKey =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5dW9rZHV4cWpnaG1xeXBoZXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDgwMDAsImV4cCI6MjA5NjE4NDAwMH0.1RIJxhyo3Nrjn52qtSP3WTJTDqFT9UayRmaBSUwkZVw";

const supabaseClient =
window.supabase.createClient(
  supabaseUrl,
  supabaseKey
);

/* =========================
   LOAD PROJECT
========================= */

const project =
JSON.parse(sessionStorage.getItem("pendingProject"));

if (!project) {
  alert("No pending project found.");
  window.location.href = "launch.html";
}

/* =========================
   WALLET
========================= */

const walletAddress =
localStorage.getItem("walletAddress") ||
"Builder Mode";

/* =========================
   DISPLAY DATA
========================= */

document.getElementById("name").textContent = project.token_name || "";
document.getElementById("symbol").textContent = project.token_symbol || "";
document.getElementById("desc").textContent = project.description || "";
document.getElementById("category").textContent = project.category || "";
document.getElementById("type").textContent = project.launch_type || "";
document.getElementById("supply").textContent = Number(project.total_supply).toLocaleString();
document.getElementById("fee").textContent = project.creator_fee + "%";
document.getElementById("web").textContent = project.website || "N/A";
document.getElementById("tw").textContent = project.twitter || "N/A";
document.getElementById("wallet").textContent = walletAddress;
document.getElementById("date").textContent = new Date().toLocaleString();

/* =========================
   CONFIRM + BLOCKCHAIN FLOW
========================= */

document.getElementById("confirmBtn").onclick = async function () {

  const btn = this;
  btn.disabled = true;

  try {

    document.getElementById("chainStatus").textContent =
      "Connecting wallet...";

    /* 1. CONNECT / INIT WEB3 */
    const wallet = await TrustLaunchChain.connectWallet();

    document.getElementById("chainStatus").textContent =
      "Deploying token on-chain...";

    /* 2. DEPLOY SMART CONTRACT */
    const receipt = await TrustLaunchChain.deployProject(project);

    console.log("Deployment receipt:", receipt);

    const txHash = receipt.hash;

    document.getElementById("chainStatus").textContent =
      "Saving to database...";

    /* 3. SAVE TO SUPABASE (NOW WITH ON-CHAIN LINK) */
    const { data, error } = await supabaseClient
      .from("launches")
      .insert([
        {
          token_name: project.token_name,
          token_symbol: project.token_symbol,
          description: project.description,
          website: project.website,
          twitter: project.twitter,
          logo: project.logo,
          category: project.category,
          launch_type: project.launch_type,
          total_supply: project.total_supply,
          creator_fee: project.creator_fee,
          creator_wallet: walletAddress,

          trust_score: project.trust_score,

          /* 🔥 NEW BLOCKCHAIN FIELDS */
          tx_hash: txHash,
          contract_address: null, // optional future upgrade

          views: 0,
          likes: 0,
          trending_score: 0,
          created_at: new Date().toISOString()
        }
      ])
      .select()
      .single();

    if (error) throw error;

    /* CLEANUP */
    sessionStorage.removeItem("pendingProject");

    document.getElementById("chainStatus").textContent =
      "Launch successful 🚀";

    alert("Launch successful 🚀");

    window.location.href = "project.html";

  } catch (err) {

    console.error(err);

    alert("Launch failed: " + err.message);

    document.getElementById("chainStatus").textContent =
      "Launch failed ❌";

    btn.disabled = false;
    btn.innerText = "🚀 Confirm Launch";
  }
};

</script>

</body>
</html>
