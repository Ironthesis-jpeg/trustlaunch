<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Project Details - TrustLaunch</title>

<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="launch.html">Launch</a>
  <a href="explore.html">Explore</a>
  <a href="wallet.html">Wallet</a>
  <a href="trending.html">Trending</a>
</nav>

<h1>🚀 Project Details</h1>

<section>
  <h2 id="title">Loading...</h2>

  <p>Symbol: <span id="symbol"></span></p>
  <p>Type: <span id="type"></span></p>
  <p>Trust Score: <span id="trust"></span></p>
  <p>Views: <span id="views">0</span></p>
  <p>Likes: <span id="likes">0</span></p>

  <button id="likeBtn">❤️ Like</button>
  <button id="shareBtn">🔗 Share</button>

  <p>Creator: <span id="creator"></span></p>
  <p>Created: <span id="created"></span></p>
</section>

<hr>

<section>
  <h2>📊 Rank Info</h2>
  <p id="score"></p>
</section>

<script>

/* =========================
   SUPABASE
========================= */

const supabase = window.supabase.createClient(
  "https://uyuokduxqjghmqypheyi.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5dW9rZHV4cWpnaG1xeXBoZXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDgwMDAsImV4cCI6MjA5NjE4NDAwMH0.1RIJxhyo3Nrjn52qtSP3WTJTDqFT9UayRmaBSUwkZVw"
);

/* =========================
   GET SELECTED PROJECT
========================= */

const project = JSON.parse(localStorage.getItem("selectedProject"));

if (!project) {
  document.body.innerHTML = "<h2>No project found</h2>";
}

/* =========================
   LOAD REAL DATA FROM SUPABASE
========================= */

async function loadProject() {

  const { data } = await supabase
    .from("launches")
    .select("*")
    .eq("id", project.id)
    .single();

  if (!data) return;

  window.currentProject = data;

  render(data);
  incrementViews(data);
}

/* =========================
   INCREMENT VIEWS (REAL DB)
========================= */

async function incrementViews(p) {

  await supabase
    .from("launches")
    .update({ views: (p.views || 0) + 1 })
    .eq("id", p.id);
}

/* =========================
   LIKE SYSTEM (REAL DB)
========================= */

document.getElementById("likeBtn").onclick = async function () {

  const p = window.currentProject;

  const { data } = await supabase
    .from("launches")
    .select("likes")
    .eq("id", p.id)
    .single();

  const newLikes = (data.likes || 0) + 1;

  await supabase
    .from("launches")
    .update({ likes: newLikes })
    .eq("id", p.id);

  document.getElementById("likes").textContent = newLikes;
};

/* =========================
   SHARE
========================= */

document.getElementById("shareBtn").onclick = function () {
  navigator.clipboard.writeText(location.href);
  alert("Link copied");
};

/* =========================
   RENDER
========================= */

function render(p) {

  const score =
    (p.likes || 0) +
    (p.views || 0) +
    (p.trust_score || 0);

  document.getElementById("title").textContent = p.token_name;
  document.getElementById("symbol").textContent = p.token_symbol;
  document.getElementById("type").textContent = p.launch_type;
  document.getElementById("trust").textContent = p.trust_score;
  document.getElementById("views").textContent = p.views || 0;
  document.getElementById("likes").textContent = p.likes || 0;
  document.getElementById("creator").textContent = p.creator_wallet;
  document.getElementById("created").textContent = p.created_at;

  document.getElementById("score").textContent =
    "Score: " + score;
}

/* INIT */
loadProject();

</script>

</body>
</html>
