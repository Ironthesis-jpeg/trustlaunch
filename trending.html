<h1>🔥 Trending Projects</h1>

<div id="container">
  <p>Loading trending projects...</p>
</div>

<script>

/* =========================
   SUPABASE
========================= */

const supabase = window.supabase.createClient(
  "https://uyuokduxqjghmqypheyi.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5dW9rZHV4cWpnaG1xeXBoZXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDgwMDAsImV4cCI6MjA5NjE4NDAwMH0.1RIJxhyo3Nrjn52qtSP3WTJTDqFT9UayRmaBSUwkZVw"
);

/* =========================
   TREND SCORE CALCULATOR
========================= */

function calculateTrend(p) {

  const likes = Number(p.likes || 0);
  const views = Number(p.views || 0);
  const trust = Number(p.trust_score || 0);

  const created = new Date(p.created_at || Date.now());
  const ageHours = (Date.now() - created.getTime()) / (1000 * 60 * 60);

  let recencyBoost = 0;

  if (ageHours < 6) recencyBoost = 80;
  else if (ageHours < 24) recencyBoost = 50;
  else if (ageHours < 72) recencyBoost = 20;

  const engagement = (likes * 4) + (views * 0.5);

  return engagement + (trust * 1.5) + recencyBoost;
}

/* =========================
   LOAD TRENDING
========================= */

async function loadTrending() {

  const { data, error } = await supabase
    .from("launches")
    .select("*");

  if (error) {
    document.getElementById("container").innerHTML =
      "Error loading trending";
    return;
  }

  let list = data || [];

  // compute score locally (FAST — no DB spam)
  list = list.map(p => ({
    ...p,
    trend_score: calculateTrend(p)
  }));

  list.sort((a, b) => b.trend_score - a.trend_score);

  render(list);
}

/* =========================
   RENDER UI
========================= */

function render(list) {

  const container = document.getElementById("container");
  container.innerHTML = "";

  if (!list.length) {
    container.innerHTML = "<p>No trending projects yet</p>";
    return;
  }

  list.forEach((p, index) => {

    let badge = "🚀 Hot";
    if (index === 0) badge = "🔥 #1 Trending";
    else if (p.trend_score > 800) badge = "👑 Viral";
    else if (p.trend_score > 400) badge = "⚡ Rising";

    container.innerHTML += `
      <div style="padding:10px; border-bottom:1px solid #333">

        <h3>${badge} ${p.token_name}</h3>

        <p><strong>Symbol:</strong> ${p.token_symbol}</p>
        <p><strong>Likes:</strong> ${p.likes || 0}</p>
        <p><strong>Views:</strong> ${p.views || 0}</p>
        <p><strong>Trust:</strong> ${p.trust_score}</p>
        <p><strong>Trend Score:</strong> ${Math.floor(p.trend_score)}</p>

        <button onclick='openProject(${JSON.stringify(p)})'>
          View Project
        </button>

      </div>
    `;
  });
}

/* =========================
   OPEN PROJECT
========================= */

function openProject(p) {
  localStorage.setItem("selectedProject", JSON.stringify(p));
  window.location.href = "project.html";
}

/* =========================
   AUTO REFRESH (REAL TIME FEEL)
========================= */

loadTrending();

setInterval(() => {
  loadTrending();
}, 5000);

</script>
