<h1>🚀 Launch Token</h1>

<form onsubmit="reviewLaunch(event)">

<label>Token Name</label><br>
<input id="tokenName" type="text"><br><br>

<label>Token Symbol</label><br>
<input id="tokenSymbol" type="text"><br><br>

<label>Description</label><br>
<textarea id="projectDescription"></textarea><br><br>

<label>Website</label><br>
<input id="projectWebsite"><br><br>

<label>Twitter</label><br>
<input id="projectTwitter"><br><br>

<label>Logo URL</label><br>
<input id="projectLogo"><br><br>

<label>Category</label><br>
<select id="projectCategory">
  <option>Meme</option>
  <option>AI</option>
  <option>DeFi</option>
  <option>Gaming</option>
</select><br><br>

<label>Launch Type</label><br>
<select id="launchType">
  <option>Meme</option>
  <option>Safe</option>
  <option>Pro</option>
</select><br><br>

<label>Total Supply</label><br>
<input id="totalSupply" type="number"><br><br>

<label>Creator Fee (%)</label><br>
<select id="creatorFee">
  <option value="0">0%</option>
  <option value="1">1%</option>
  <option value="2">2%</option>
</select><br><br>

<button type="submit">Review Launch</button>

</form>

<script>

const supabase = supabase.createClient(
  "https://uyuokduxqjghmqypheyi.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5dW9rZHV4cWpnaG1xeXBoZXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDgwMDAsImV4cCI6MjA5NjE4NDAwMH0.1RIJxhyo3Nrjn52qtSP3WTJTDqFT9UayRmaBSUwkZVw"
);

function getWallet() {
  return localStorage.getItem("walletAddress");
}

window.reviewLaunch = function(e) {
  e.preventDefault();

  const wallet = getWallet();
  if (!wallet) return alert("Connect wallet first");

  const project = {
    token_name: tokenName.value,
    token_symbol: tokenSymbol.value,
    description: projectDescription.value,
    website: projectWebsite.value,
    twitter: projectTwitter.value,
    logo: projectLogo.value,
    category: projectCategory.value,
    launch_type: launchType.value,
    total_supply: Number(totalSupply.value),
    creator_fee: Number(creatorFee.value),
    creator_wallet: wallet,
    trust_score: 100,
    views: 0,
    likes: 0,
    created_at: new Date().toISOString()
  };

  localStorage.setItem("pendingProject", JSON.stringify(project));
  window.location.href = "review.html";
};

</script>
