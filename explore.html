<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Explore Projects - TrustLaunch</title>
<link rel="stylesheet" href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="launch.html">Launch</a>
  <a href="explore.html">Explore</a>
  <a href="wallet.html">Wallet</a>
  <a href="leaderboard.html">Leaderboard</a>
  <a href="halloffame.html">Hall of Fame</a>
  <a href="trending.html">Trending</a>
  <a href="notifications.html">Notifications</a>
  <a href="watchlist.html">Watchlist</a>
</nav>

<h1>🚀 Explore Projects</h1>

<section>

<input id="searchInput" type="text"
placeholder="Search token name or symbol"
onkeyup="renderProjects()">

<br><br>

<button onclick="setFilter('All')">All</button>
<button onclick="setFilter('Meme')">Meme</button>
<button onclick="setFilter('Safe')">Safe</button>
<button onclick="setFilter('Pro')">Pro</button>

<br><br>

<select id="sortSelect" onchange="renderProjects()">
  <option value="newest">Newest</option>
  <option value="trust">Trust Score</option>
  <option value="rank">Rank Score</option>
  <option value="likes">Likes</option>
  <option value="views">Views</option>
</select>

<br><br>

<div id="projectsContainer">
  <p>Loading projects...</p>
</div>

</section>

<footer>
  <p>TrustLaunch</p>
</footer>

<script>

/* =========================
   SUPABASE SETUP
========================= */

const supabaseUrl = "https://uyuokduxqjghmqypheyi.supabase.co";
const supabaseKey = "YOUR_ANON_KEY";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

/* =========================
   STATE
========================= */

let projects = [];
let currentFilter = "All";

/* =========================
   LOAD FROM SUPABASE
========================= */

async function loadProjects() {

  const { data, error } = await supabase
    .from("launches")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.error(error);
    document.getElementById("projectsContainer").innerHTML =
      "<p>Error loading projects</p>";
    return;
  }

  projects = data || [];
  renderProjects();
}

function setFilter(filter) {
  currentFilter = filter;
  renderProjects();
}

/* =========================
   RANK SYSTEM (REALISTIC)
========================= */

function calculateRank(p) {

  const likes = Number(p.likes || 0);
  const views = Number(p.views || 0);
  const trust = Number(p.trust_score || 0);

  const creatorBoost = Math.min(100, trust * 0.3);

  return trust + likes * 2 + views * 0.5 + creatorBoost;
}

/* =========================
   VIEW PROJECT
========================= */

function viewProject(project) {
  localStorage.setItem("selectedProject", JSON.stringify(project));
  window.location.href = "project.html";
}

/* =========================
   RENDER
========================= */

function renderProjects() {

  const container = document.getElementById("projectsContainer");
  const search = document.getElementById("searchInput").value.toLowerCase();
  const sortType = document.getElementById("sortSelect").value;

  let list = [...projects];

  /* FILTER */
  list = list.filter(p => {

    const matchesSearch =
      (p.token_name || "").toLowerCase().includes(search) ||
      (p.token_symbol || "").toLowerCase().includes(search);

    const matchesFilter =
      currentFilter === "All" ||
      p.category === currentFilter;

    return matchesSearch && matchesFilter;
  });

  /* SORT */
  if (sortType === "newest") {
    list.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  }

  if (sortType === "trust") {
    list.sort((a,b) => (b.trust_score || 0) - (a.trust_score || 0));
  }

  if (sortType === "rank") {
    list.sort((a,b) => calculateRank(b) - calculateRank(a));
  }

  if (sortType === "likes") {
    list.sort((a,b) => (b.likes || 0) - (a.likes || 0));
  }

  if (sortType === "views") {
    list.sort((a,b) => (b.views || 0) - (a.views || 0));
  }

  /* EMPTY */
  if (list.length === 0) {
    container.innerHTML = "<p>No projects found.</p>";
    return;
  }

  /* RENDER */
  container.innerHTML = "";

  list.forEach(p => {

    const rank = calculateRank(p);

    let badge = "🚀 New";
    if (rank >= 200) badge = "🏆 Elite";
    else if (rank >= 170) badge = "⭐ Trusted";

    container.innerHTML += `
      <div style="padding:10px; border-bottom:1px solid #333;">

        <h3>${badge} ${p.token_name}</h3>

        <p><strong>Symbol:</strong> ${p.token_symbol}</p>
        <p><strong>Category:</strong> ${p.category || "N/A"}</p>
        <p><strong>Type:</strong> ${p.launch_type}</p>
        <p><strong>Trust Score:</strong> ${p.trust_score}</p>
        <p><strong>Rank Score:</strong> ${rank.toFixed(2)}</p>

        <p><strong>Likes:</strong> ${p.likes || 0}</p>
        <p><strong>Views:</strong> ${p.views || 0}</p>

        <button onclick='viewProject(${JSON.stringify(p)})'>
          View Project
        </button>

      </div>
    `;
  });
}

/* INIT */
loadProjects();

</script>

</body>
</html>
