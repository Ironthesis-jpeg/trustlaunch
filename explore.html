<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Explore Projects - TrustLaunch</title>

<link rel="stylesheet" href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/@metamask/detect-provider"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="wallet.js"></script>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="launch.html">Launch</a>
  <a href="explore.html">Explore</a>
  <a href="wallet.html">Wallet</a>
  <a href="trending.html">Trending</a>

  <button onclick="connectWallet()">
    Connect Wallet
  </button>

  <span id="walletDisplay" style="margin-left:10px;">
    Not Connected
  </span>
</nav>

<h1>🚀 Explore Projects</h1>

<section>

  <input
    id="searchInput"
    type="text"
    placeholder="Search token name or symbol"
    onkeyup="renderProjects()"
  >

  <br><br>

  <button onclick="setFilter('All')">All</button>
  <button onclick="setFilter('Meme')">Meme</button>
  <button onclick="setFilter('Safe')">Safe</button>
  <button onclick="setFilter('Pro')">Pro</button>

  <br><br>

  <button onclick="setSort('newest')">
    Newest
  </button>

  <button onclick="setSort('trust')">
    Highest Trust
  </button>

  <button onclick="setSort('trending')">
    Trending
  </button>

</section>

<hr>

<section>
  <div id="projectsContainer">
    Loading Projects...
  </div>
</section>

<script>

/* =========================
   SUPABASE
========================= */

const supabase =
window.supabase.createClient(
  "https://uyuokduxqjghmqypheyi.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5dW9rZHV4cWpnaG1xeXBoZXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDgwMDAsImV4cCI6MjA5NjE4NDAwMH0.1RIJxhyo3Nrjn52qtSP3WTJTDqFT9UayRmaBSUwkZVw"
);

/* =========================
   STATE
========================= */

let projects = [];
let currentFilter = "All";
let currentSort = "newest";

/* =========================
   LOAD PROJECTS
========================= */

async function loadProjects() {

  const container =
    document.getElementById(
      "projectsContainer"
    );

  container.innerHTML =
    "Loading Projects...";

  const { data, error } =
    await supabase
      .from("launches")
      .select("*");

  if (error) {

    console.error(error);

    container.innerHTML =
      "Failed to load projects";

    return;
  }

  projects = data || [];

  renderProjects();
}

/* =========================
   FILTER
========================= */

function setFilter(type) {

  currentFilter = type;

  renderProjects();
}

/* =========================
   SORT
========================= */

function setSort(type) {

  currentSort = type;

  renderProjects();
}

/* =========================
   COMMUNITY SCORE
========================= */

function getCommunityScore(project) {

  const green =
    Number(project.green_flags || 0);

  const red =
    Number(project.red_flags || 0);

  return green - red;
}

/* =========================
   TRENDING SCORE
========================= */

function getTrendingScore(project) {

  const trust =
    Number(project.trust_score || 0);

  const green =
    Number(project.green_flags || 0);

  const red =
    Number(project.red_flags || 0);

  return trust + (green * 2) - red;
}

/* =========================
   VIEW PROJECT
========================= */

function openProject(project) {

  localStorage.setItem(
    "selectedProject",
    JSON.stringify(project)
  );

  window.location.href =
    "project.html";
}

/* =========================
   RENDER PROJECTS
========================= */

function renderProjects() {

  const container =
    document.getElementById(
      "projectsContainer"
    );

  const search =
    document
      .getElementById(
        "searchInput"
      )
      .value
      .toLowerCase();

  let list = [...projects];

  /* SEARCH */

  list = list.filter(project => {

    const name =
      (project.token_name || "")
      .toLowerCase();

    const symbol =
      (project.token_symbol || "")
      .toLowerCase();

    const searchMatch =
      name.includes(search) ||
      symbol.includes(search);

    const filterMatch =
      currentFilter === "All" ||
      project.launch_type === currentFilter;

    return searchMatch && filterMatch;
  });

  /* SORT */

  if (currentSort === "newest") {

    list.sort((a, b) =>
      new Date(b.created_at) -
      new Date(a.created_at)
    );
  }

  if (currentSort === "trust") {

    list.sort((a, b) =>
      (b.trust_score || 0) -
      (a.trust_score || 0)
    );
  }

  if (currentSort === "trending") {

    list.sort((a, b) =>
      getTrendingScore(b) -
      getTrendingScore(a)
    );
  }

  if (list.length === 0) {

    container.innerHTML =
      "<p>No projects found</p>";

    return;
  }

  container.innerHTML = "";

  list.forEach(project => {

    const community =
      getCommunityScore(project);

    const trending =
      getTrendingScore(project);

    container.innerHTML += `

      <div class="project-card">

        <h3>
          🚀 ${project.token_name}
        </h3>

        <p>
          <strong>Symbol:</strong>
          ${project.token_symbol}
        </p>

        <p>
          <strong>Launch:</strong>
          ${project.launch_type}
        </p>

        <p>
          <strong>Trust Score:</strong>
          ${project.trust_score || 0}
        </p>

        <p>
          ✅ Green Flags:
          ${project.green_flags || 0}
        </p>

        <p>
          ❌ Red Flags:
          ${project.red_flags || 0}
        </p>

        <p>
          <strong>Community Score:</strong>
          ${community}
        </p>

        <p>
          <strong>Trending Score:</strong>
          ${trending}
        </p>

        <p>
          <strong>Contract:</strong><br>
          ${
            project.contract_address
            ? project.contract_address
            : "Not deployed"
          }
        </p>

        ${
          project.contract_address
          ? "<p>🟢 On-Chain</p>"
          : "<p>⚪ Pending</p>"
        }

        <button
          onclick='openProject(${JSON.stringify(project)})'
        >
          View Project
        </button>

        <hr>

      </div>
    `;
  });
}

/* =========================
   INIT
========================= */

loadProjects();

</script>

</body>
</html>
