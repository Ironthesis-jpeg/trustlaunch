<head>

<meta charset="UTF-8">
<title>Creator Profile - TrustLaunch</title><link rel="stylesheet" href="styles.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head><body><nav>
  <a href="index.html">Home</a>
  <a href="launch.html">Launch</a>
  <a href="explore.html">Explore</a>
  <a href="wallet.html">Wallet</a>
  <a href="trending.html">Trending</a>

  <!-- WALLET CONNECT BUTTON -->
  <button onclick="connectWallet()">
    Connect Wallet
  </button>

  <!-- SHOW CONNECTED WALLET -->
  <span id="walletDisplay" style="margin-left:10px;">
    Not Connected
  </span>
</nav><h1>👤 Creator Profile</h1><section><p><strong>Wallet:</strong> <span id="walletAddress">Loading...</span></p><p><strong>Projects Launched:</strong> <span id="projectsCount">0</span></p><p><strong>Founder Reputation:</strong> <span id="founderReputation">0</span></p><p><strong>Badge:</strong> <span id="creatorBadge">-</span></p><p><strong>Founder Level:</strong> <span id="creatorLevel">0</span></p><p><strong>Creator Score:</strong> <span id="creatorScore">0</span></p><p><strong>Hall Of Fame Projects:</strong> <span id="hofProjects">0</span></p><p><strong>Latest Launch:</strong> <span id="latestLaunch">-</span></p></section><section><h2>🚀 Projects By Creator</h2><div id="creatorProjects">
Loading...
</div></section><footer>
<p>TrustLaunch</p>
<p>Build trust before hype.</p>
</footer><script>

/* =========================
   SUPABASE
========================= */

const supabaseUrl =
"https://uyuokduxqjghmqypheyi.supabase.co";

const supabaseKey =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5dW9rZHV4cWpnaG1xeXBoZXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDgwMDAsImV4cCI6MjA5NjE4NDAwMH0.1RIJxhyo3Nrjn52qtSP3WTJTDqFT9UayRmaBSUwkZVw";

const supabase =
window.supabase.createClient(
  supabaseUrl,
  supabaseKey
);

/* =========================
   GET WALLET FROM URL
========================= */

const params =
new URLSearchParams(window.location.search);

const creatorWallet =
params.get("wallet");

/* =========================
   LOAD CREATOR
========================= */

async function loadCreator() {

  if (!creatorWallet) {

    document.getElementById(
      "creatorProjects"
    ).innerHTML =
    "<p>Creator not found.</p>";

    return;
  }

  document.getElementById(
    "walletAddress"
  ).textContent =
  creatorWallet;

  const { data, error } =
  await supabase
    .from("launches")
    .select("*")
    .eq("creator_wallet", creatorWallet)
    .order("created_at", {
      ascending: false
    });

  if (error) {

    console.error(error);

    document.getElementById(
      "creatorProjects"
    ).innerHTML =
    "<p>Error loading creator.</p>";

    return;
  }

  const projects = data || [];

  renderCreator(projects);
}

/* =========================
   RENDER CREATOR
========================= */

function renderCreator(projects) {

  document.getElementById(
    "projectsCount"
  ).textContent =
  projects.length;

  let reputation =
    Math.min(
      100,
      50 + (projects.length * 10)
    );

  document.getElementById(
    "founderReputation"
  ).textContent =
  reputation;

  let badge =
    "⭐ New Founder";

  if (projects.length >= 5)
    badge = "🏆 Trusted Founder";

  if (projects.length >= 10)
    badge = "👑 Elite Founder";

  if (projects.length >= 25)
    badge = "🔥 Legendary Founder";

  document.getElementById(
    "creatorBadge"
  ).textContent =
  badge;

  let level = 1;

  if (projects.length >= 3) level = 2;
  if (projects.length >= 5) level = 3;
  if (projects.length >= 10) level = 4;
  if (projects.length >= 25) level = 5;

  document.getElementById(
    "creatorLevel"
  ).textContent =
  level;

  const hofProjects =
  projects.filter(
    p =>
      Number(p.trust_score || 0) >= 95
  ).length;

  document.getElementById(
    "hofProjects"
  ).textContent =
  hofProjects;

  const avgTrust =
  projects.length
  ?
  projects.reduce(
    (sum,p)=>
    sum +
    Number(p.trust_score || 0),
    0
  ) / projects.length
  :
  0;

  const creatorScore =
  Math.round(
    avgTrust +
    reputation +
    (projects.length * 5) +
    (hofProjects * 25)
  );

  document.getElementById(
    "creatorScore"
  ).textContent =
  creatorScore;

  if (projects.length) {

    document.getElementById(
      "latestLaunch"
    ).textContent =
    new Date(
      projects[0].created_at
    ).toLocaleString();
  }

  const container =
  document.getElementById(
    "creatorProjects"
  );

  container.innerHTML = "";

  if (!projects.length) {

    container.innerHTML =
    "<p>No projects found.</p>";

    return;
  }

  projects.forEach(project => {

    container.innerHTML += `

      <div>

        <h3>
          🚀 ${project.token_name}
        </h3>

        <p>
          <strong>Symbol:</strong>
          ${project.token_symbol}
        </p>

        <p>
          <strong>Launch Type:</strong>
          ${project.launch_type}
        </p>

        <p>
          <strong>Trust Score:</strong>
          ${project.trust_score}
        </p>

        <p>
          <strong>Launch Date:</strong>
          ${new Date(
            project.created_at
          ).toLocaleString()}
        </p>

        <button
          onclick="viewProject('${project.id}')">

          View Project

        </button>

        <hr>

      </div>

    `;
  });
}

/* =========================
   VIEW PROJECT
========================= */

function viewProject(id) {

  window.location.href =
  "project.html?id=" + id;
}

/* =========================
   INIT
========================= */

loadCreator();

</script></body>
</html>
