<link rel="stylesheet" href="styles.css">

<body>

<<nav>
  <a href="index.html">Home</a>

  <a href="explore.html">Explore</a>
  <a href="wallet.html">Wallet</a>

  <!-- WALLET CONNECT BUTTON -->
  <button onclick="connectWallet()">
    Connect Wallet
  </button>

  <!-- SHOW CONNECTED WALLET -->
  <span id="walletDisplay" style="margin-left:10px;">
    Not Connected
  </span>
</nav>

<h1>⭐ My Watchlist</h1>

<section>
  <div id="watchlistContainer">
    <p>Loading...</p>
  </div>
</section>

<script>

const supabase = window.supabase.createClient(
  "https://uyuokduxqjghmqypheyi.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5dW9rZHV4cWpnaG1xeXBoZXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDgwMDAsImV4cCI6MjA5NjE4NDAwMH0.1RIJxhyo3Nrjn52qtSP3WTJTDqFT9UayRmaBSUwkZVw"
);

/* =========================
   WALLET
========================= */

function getWallet() {
  return localStorage.getItem("walletAddress");
}

/* =========================
   LOAD WATCHLIST
========================= */

async function loadWatchlist() {

  const wallet = getWallet();

  if (!wallet) {
    document.getElementById("watchlistContainer").innerHTML =
      "<p>Please connect wallet</p>";
    return;
  }

  const { data, error } = await supabase
    .from("watchlist")
    .select("*, launches(*)")
    .eq("wallet", wallet);

  if (error) {
    document.getElementById("watchlistContainer").innerHTML =
      "<p>Error loading watchlist</p>";
    return;
  }

  render(data || []);
}

/* =========================
   REMOVE FROM WATCHLIST
========================= */

async function removeItem(projectId) {

  const wallet = getWallet();

  await supabase
    .from("watchlist")
    .delete()
    .eq("wallet", wallet)
    .eq("project_id", projectId);

  loadWatchlist();
}

/* =========================
   RENDER
========================= */

function render(items) {

  const container = document.getElementById("watchlistContainer");
  container.innerHTML = "";

  if (!items.length) {
    container.innerHTML = "<p>No saved projects.</p>";
    return;
  }

  items.forEach(item => {

    const p = item.launches;

    container.innerHTML += `
      <div style="margin-bottom:15px">

        <h3>🚀 ${p.token_name}</h3>

        <p>Symbol: ${p.token_symbol}</p>
        <p>Trust Score: ${p.trust_score}</p>
        <p>Likes: ${p.likes}</p>
        <p>Views: ${p.views}</p>

        <button onclick='openProject(${JSON.stringify(p)})'>
          View
        </button>

        <button onclick='removeItem("${item.project_id}")'>
          ❌ Remove
        </button>

        <hr>
      </div>
    `;
  });
}

/* =========================
   OPEN PROJECT
========================= */

function openProject(p) {
  localStorage.setItem("selectedProject", JSON.stringify(p));
  window.location.href = "project.html";
}

/* INIT */
loadWatchlist();

</script>

</body>
</html>
