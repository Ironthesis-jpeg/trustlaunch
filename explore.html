</nav><h1>🚀 Explore Projects</h1><section><input
id="searchInput"
type="text"
placeholder="Search token name or symbol"
onkeyup="renderProjects()"

«»

<br><br>

<button onclick="setFilter('All')">All</button>
<button onclick="setFilter('Meme')">Meme</button>
<button onclick="setFilter('Safe')">Safe</button>
<button onclick="setFilter('Pro')">Pro</button>

<br><br>

<div id="projectsContainer">
  <p>Loading projects...</p>
</div></section><script>

/* =========================
   SUPABASE
========================= */

const supabaseUrl =
"https://uyuokduxqjghmqypheyi.supabase.co";

const supabaseKey =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5dW9rZHV4cWpnaG1xeXBoZXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDgwMDAsImV4cCI6MjA5NjE4NDAwMH0.1RIJxhyo3Nrjn52qtSP3WTJTDqFT9UayRmaBSUwkZVw";

const supabase =
window.supabase.createClient(
  supabaseUrl,
  supabaseKey
);

/* =========================
   STATE
========================= */

let projects = [];
let currentFilter = "All";

/* =========================
   LOAD PROJECTS
========================= */

async function loadProjects() {

  const container =
    document.getElementById("projectsContainer");

  container.innerHTML =
    "<p>Loading projects...</p>";

  const { data, error } =
    await supabase
      .from("launches")
      .select("*")
      .order("created_at", {
        ascending: false
      });

  if (error) {

    console.error(error);

    container.innerHTML =
      "<p>Error loading projects.</p>";

    return;
  }

  projects = data || [];

  renderProjects();
}

/* =========================
   FILTER
========================= */

function setFilter(filter) {

  currentFilter = filter;

  renderProjects();
}

/* =========================
   VIEW PROJECT
========================= */

function viewProject(projectId) {

  window.location.href =
    "project.html?id=" + projectId;
}

/* =========================
   RENDER PROJECTS
========================= */

function renderProjects() {

  const container =
    document.getElementById("projectsContainer");

  const search =
    document.getElementById("searchInput")
    .value
    .toLowerCase();

  container.innerHTML = "";

  let list = [...projects];

  list = list.filter(project => {

    const tokenName =
      (project.token_name || "")
      .toLowerCase();

    const tokenSymbol =
      (project.token_symbol || "")
      .toLowerCase();

    const matchesSearch =
      tokenName.includes(search) ||
      tokenSymbol.includes(search);

    const matchesFilter =
      currentFilter === "All" ||
      project.launch_type === currentFilter;

    return matchesSearch && matchesFilter;
  });

  if (!list.length) {

    container.innerHTML =
      "<p>No projects found.</p>";

    return;
  }

  list.forEach(project => {

    const trendScore =
      (Number(project.likes || 0) * 3) +
      (Number(project.views || 0) * 0.5) +
      Number(project.trust_score || 0);

    container.innerHTML += `

      <div>

        <h3>🚀 ${project.token_name}</h3>

        <p>
          <strong>Symbol:</strong>
          ${project.token_symbol}
        </p>

        <p>
          <strong>Type:</strong>
          ${project.launch_type}
        </p>

        <p>
          <strong>Trust Score:</strong>
          ${project.trust_score || 0}
        </p>

        <p>
          <strong>Views:</strong>
          ${project.views || 0}
        </p>

        <p>
          <strong>Likes:</strong>
          ${project.likes || 0}
        </p>

        <p>
          <strong>Trend Score:</strong>
          ${trendScore.toFixed(0)}
        </p>

        <p>
          <strong>Creator:</strong>
          ${project.creator_wallet || "Unknown"}
        </p>

        <button onclick="viewProject('${project.id}')">
          View Project
        </button>

        <hr>

      </div>

    `;
  });
}

/* =========================
   INIT
========================= */

loadProjects();

</script></body>
</html>
