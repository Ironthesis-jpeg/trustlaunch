<!DOCTYPE html>
<html>
<head>
  <title>Creator Profile - TrustLaunch</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="launch.html">Launch</a>
  <a href="explore.html">Explore</a>
  <a href="wallet.html">Wallet</a>
  <a href="leaderboard.html">Leaderboard</a>
</nav>

<h1>Creator Profile</h1>

<section>

  <p>
    <strong>Wallet:</strong>
    <span id="walletAddress"></span>
  </p>

  <p>
    <strong>Projects Launched:</strong>
    <span id="projectsCount"></span>
  </p>

  <p>
    <strong>Founder Reputation:</strong>
    <span id="founderReputation"></span>
  </p>

  <p>
    <strong>Badge:</strong>
    <span id="creatorBadge"></span>
  </p>

  <p>
    <strong>Founder Level:</strong>
    <span id="creatorLevel"></span>
  </p>

  <p>
    <strong>Latest Launch:</strong>
    <span id="latestLaunch"></span>
  </p>

</section>

<section>

  <h2>Projects By Creator</h2>

  <div id="creatorProjects"></div>

</section>

<footer>
  <p>TrustLaunch</p>
  <p>Build trust before hype.</p>
</footer>

<script>

const creatorWallet =
  localStorage.getItem("selectedCreator");

const projects =
  JSON.parse(localStorage.getItem("projects")) || [];

const creatorProjects =
  projects.filter(project =>
    project.creatorWallet === creatorWallet
  );

document.getElementById("walletAddress").textContent =
  creatorWallet || "Unknown";

document.getElementById("projectsCount").textContent =
  creatorProjects.length;

/* Reputation */

let reputation = 50;

reputation += creatorProjects.length * 10;

if (reputation > 100) {
  reputation = 100;
}

document.getElementById("founderReputation").textContent =
  reputation;

/* Badge */

let badge = "⭐ New Founder";

if (creatorProjects.length >= 5)
  badge = "🏆 Trusted Founder";

if (creatorProjects.length >= 10)
  badge = "👑 Elite Founder";

if (creatorProjects.length >= 25)
  badge = "🔥 Legendary Founder";

document.getElementById("creatorBadge").textContent =
  badge;

/* Founder Level */

let level = 1;

if (creatorProjects.length >= 3)
  level = 2;

if (creatorProjects.length >= 5)
  level = 3;

if (creatorProjects.length >= 10)
  level = 4;

if (creatorProjects.length >= 25)
  level = 5;

document.getElementById("creatorLevel").textContent =
  level;

/* Latest Launch */

if (creatorProjects.length > 0) {

  const latestProject =
    creatorProjects
      .slice()
      .sort((a, b) => b.createdAt - a.createdAt)[0];

  document.getElementById("latestLaunch").textContent =
    latestProject.createdAt
      ? new Date(latestProject.createdAt).toLocaleString()
      : "Unknown";

}

/* Creator Projects */

const container =
  document.getElementById("creatorProjects");

if (creatorProjects.length === 0) {

  container.innerHTML =
    "<p>No projects found.</p>";

}

creatorProjects
  .slice()
  .sort((a, b) => b.createdAt - a.createdAt)
  .forEach(project => {

    const launchTime =
      project.createdAt
        ? new Date(project.createdAt).toLocaleString()
        : "Unknown";

    container.innerHTML += `
      <div>

        <h3>🚀 ${project.tokenName}</h3>

        <p><strong>Symbol:</strong> ${project.tokenSymbol}</p>

        <p><strong>Launch Type:</strong> ${project.launchType}</p>

        <p><strong>Trust Score:</strong> ${project.trustScore}</p>

        <p><strong>Launch Date:</strong> ${launchTime}</p>

        <button onclick='viewProject(${JSON.stringify(project)})'>
          View Project
        </button>

        <hr>

      </div>
    `;

  });

function viewProject(project) {

  localStorage.setItem(
    "selectedProject",
    JSON.stringify(project)
  );

  window.location.href =
    "project.html";

}

</script>

</body>
</html>
