<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Watchlist - TrustLaunch</title>

<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="launch.html">Launch</a>
  <a href="explore.html">Explore</a>
  <a href="wallet.html">Wallet</a>
  <a href="trending.html">Trending</a>
</nav>

<h1>⭐ My Watchlist</h1>

<section>
  <h2>Saved Projects</h2>
  <div id="watchlistContainer">
    <p>Loading watchlist...</p>
  </div>
</section>

<script>

/* =========================
   SUPABASE SETUP
========================= */

const supabase = window.supabase.createClient(
  "https://uyuokduxqjghmqypheyi.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5dW9rZHV4cWpnaG1xeXBoZXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDgwMDAsImV4cCI6MjA5NjE4NDAwMH0.1RIJxhyo3Nrjn52qtSP3WTJTDqFT9UayRmaBSUwkZVw"
);

/* =========================
   WALLET
========================= */

function getWallet() {
  return localStorage.getItem("walletAddress");
}

/* =========================
   LOAD WATCHLIST
========================= */

async function loadWatchlist() {

  const wallet = getWallet();

  if (!wallet) {
    document.getElementById("watchlistContainer").innerHTML =
      "<p>Please connect wallet</p>";
    return;
  }

  const { data, error } = await supabase
    .from("watchlist")
    .select("*")
    .eq("wallet", wallet)
    .order("created_at", { ascending: false });

  if (error) {
    document.getElementById("watchlistContainer").innerHTML =
      "<p>Error loading watchlist</p>";
    return;
  }

  render(data || []);
}

/* =========================
   REMOVE ITEM
========================= */

async function removeItem(symbol) {

  const wallet = getWallet();

  await supabase
    .from("watchlist")
    .delete()
    .eq("wallet", wallet)
    .eq("token_symbol", symbol);

  loadWatchlist();
}

/* =========================
   VIEW PROJECT
========================= */

function viewProject(item) {
  localStorage.setItem("selectedProject", JSON.stringify(item));
  window.location.href = "project.html";
}

/* =========================
   RENDER
========================= */

function render(list) {

  const container = document.getElementById("watchlistContainer");

  if (!list.length) {
    container.innerHTML = "<p>No saved projects.</p>";
    return;
  }

  container.innerHTML = "";

  list.forEach(item => {

    container.innerHTML += `
      <div>
        <h3>🚀 ${item.token_name}</h3>

        <p>Symbol: ${item.token_symbol}</p>
        <p>Trust Score: ${item.trust_score}</p>

        <button onclick='viewProject(${JSON.stringify(item)})'>
          View Project
        </button>

        <button onclick='removeItem("${item.token_symbol}")'>
          ❌ Remove
        </button>

        <hr>
      </div>
    `;
  });
}

loadWatchlist();

</script>

</body>
</html>
