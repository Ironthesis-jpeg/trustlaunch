<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/@metamask/detect-provider"></script>
<script src="wallet.js"></script>
<meta charset="UTF-8">
<title>Project Details - TrustLaunch</title>

<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="launch.html">Launch</a>
  <a href="explore.html">Explore</a>
  <a href="wallet.html">Wallet</a>
  <a href="trending.html">Trending</a>

  <!-- WALLET CONNECT BUTTON -->
  <button onclick="connectWallet()">
    Connect Wallet
  </button>

  <!-- SHOW CONNECTED WALLET -->
  <span id="walletDisplay" style="margin-left:10px;">
    Not Connected
  </span>
</nav>

<h1>🚀 Project</h1>

<section>
  <h2 id="title">Loading...</h2>

  <p>Symbol: <span id="symbol"></span></p>
  <p>Trust: <span id="trust"></span></p>
  <p>Likes: <span id="likes"></span></p>
  <p>Views: <span id="views"></span></p>

  <button id="likeBtn">❤️ Like</button>
</section>

<hr>

<section>
  <h2>💬 Comments</h2>

  <input id="commentInput" placeholder="Write a comment">
  <button onclick="postComment()">Post</button>

  <div id="comments"></div>
</section>

<script>

const supabase = window.supabase.createClient(
  "https://uyuokduxqjghmqypheyi.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5dW9rZHV4cWpnaG1xeXBoZXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDgwMDAsImV4cCI6MjA5NjE4NDAwMH0.1RIJxhyo3Nrjn52qtSP3WTJTDqFT9UayRmaBSUwkZVw"
);

const project = JSON.parse(localStorage.getItem("selectedProject"));

if (!project) {
  document.body.innerHTML = "<h2>No project found</h2>";
}

let currentProject = project;

/* =========================
   LOAD COMMENTS
========================= */

async function loadComments() {

  const { data } = await supabase
    .from("comments")
    .select("*")
    .eq("project_id", currentProject.id)
    .order("created_at", { ascending: false });

  renderComments(data || []);
}

/* =========================
   POST COMMENT
========================= */

async function postComment() {

  const input = document.getElementById("commentInput");
  const text = input.value.trim();

  if (!text) return;

  const wallet = localStorage.getItem("walletAddress");

  await supabase
    .from("comments")
    .insert([{
      project_id: currentProject.id,
      wallet,
      message: text
    }]);

  input.value = "";
  loadComments();
}

/* =========================
   RENDER COMMENTS
========================= */

function renderComments(comments) {

  const container = document.getElementById("comments");
  container.innerHTML = "";

  if (!comments.length) {
    container.innerHTML = "<p>No comments yet</p>";
    return;
  }

  comments.forEach(c => {

    container.innerHTML += `
      <div style="margin-bottom:10px">
        <b>${c.wallet || "anon"}</b>
        <p>${c.message}</p>
        <small>${new Date(c.created_at).toLocaleString()}</small>
        <hr>
      </div>
    `;
  });
}

/* INIT */
loadComments();

</script>

</body>
</html>
