<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Review Launch - TrustLaunch</title>

<link rel="stylesheet" href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>

<script src="wallet.js"></script>
<script src="contract.js"></script>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="launch.html">Launch</a>
  <a href="explore.html">Explore</a>
  <a href="wallet.html">Wallet</a>
  <a href="trending.html">Trending</a>

  <button onclick="connectWallet()">Connect Wallet</button>

  <span id="walletDisplay">Not Connected</span>
</nav>

<h1>🚀 Review Launch</h1>

<section>

  <p><strong>Token Name:</strong> <span id="name"></span></p>
  <p><strong>Symbol:</strong> <span id="symbol"></span></p>
  <p><strong>Description:</strong> <span id="desc"></span></p>
  <p><strong>Category:</strong> <span id="category"></span></p>
  <p><strong>Launch Type:</strong> <span id="type"></span></p>
  <p><strong>Total Supply:</strong> <span id="supply"></span></p>
  <p><strong>Creator Fee:</strong> <span id="fee"></span></p>
  <p><strong>Website:</strong> <span id="web"></span></p>
  <p><strong>Twitter:</strong> <span id="tw"></span></p>
  <p><strong>Wallet:</strong> <span id="wallet"></span></p>
  <p><strong>Date:</strong> <span id="date"></span></p>

  <hr>

  <p><strong>Status:</strong> <span id="status">Waiting</span></p>
  <p><strong>Tx Hash:</strong> <span id="txhash">-</span></p>
  <p><strong>Contract Address:</strong> <span id="contract">-</span></p>

</section>

<hr>

<button onclick="window.location.href='launch.html'">
⬅ Back
</button>

<button id="confirmBtn">
🚀 Confirm Launch
</button>

<script>

/* =========================
   SUPABASE (FUTURE SAFE)
========================= */

const supabaseUrl =
"https://uyuokduxqjghmqypheyi.supabase.co";

const supabaseKey =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5dW9rZHV4cWpnaG1xeXBoZXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDgwMDAsImV4cCI6MjA5NjE4NDAwMH0.1RIJxhyo3Nrjn52qtSP3WTJTDqFT9UayRmaBSUwkZVw";

const supabaseClient =
window.supabase.createClient(supabaseUrl, supabaseKey);

/* =========================
   LOAD PROJECT
========================= */

const project =
JSON.parse(sessionStorage.getItem("pendingProject"));

if (!project) {
  alert("No pending project found.");
  window.location.href = "launch.html";
}

/* =========================
   WALLET
========================= */

const walletAddress =
localStorage.getItem("walletAddress") || "Builder Mode";

/* =========================
   DISPLAY
========================= */

function set(id, value) {
  document.getElementById(id).textContent = value;
}

set("name", project.token_name);
set("symbol", project.token_symbol);
set("desc", project.description);
set("category", project.category);
set("type", project.launch_type);
set("supply", Number(project.total_supply).toLocaleString());
set("fee", project.creator_fee + "%");
set("web", project.website || "N/A");
set("tw", project.twitter || "N/A");
set("wallet", walletAddress);
set("date", new Date().toLocaleString());

/* =========================
   SAFE CONTRACT EXTRACTION
========================= */

function extractContract(receipt) {

  if (!receipt) return null;

  if (receipt.contractAddress) return receipt.contractAddress;

  try {
    const logs = receipt.logs || [];

    for (const log of logs) {
      if (log?.args?.projectAddress) {
        return log.args.projectAddress;
      }
    }
  } catch (e) {}

  return null;
}

/* =========================
   UPDATE UI STATE
========================= */

function updateStatus(text) {
  set("status", text);
}

/* =========================
   MAIN FLOW (FUTURE PROOF)
========================= */

document.getElementById("confirmBtn").onclick = async function () {

  const btn = this;
  btn.disabled = true;

  try {

    updateStatus("Connecting wallet...");

    const wallet = await TrustLaunchChain.connectWallet();

    updateStatus("Deploying on blockchain...");

    const receipt =
      await TrustLaunchChain.deployProject(project);

    const txHash = receipt.hash;

    const contractAddress =
      extractContract(receipt);

    set("txhash", txHash);
    set("contract", contractAddress || "Pending / Not returned");

    updateStatus("Saving to database...");

    const fullProjectData = {
      ...project,

      creator_wallet: walletAddress,

      tx_hash: txHash,
      contract_address: contractAddress,

      views: 0,
      likes: 0,
      trending_score: 0,

      created_at: new Date().toISOString()
    };

    const { data, error } = await supabaseClient
      .from("launches")
      .insert([fullProjectData])
      .select()
      .single();

    if (error) throw error;

    /* SAVE FOR GLOBAL ACCESS */
    localStorage.setItem(
      "selectedProject",
      JSON.stringify(data)
    );

    sessionStorage.removeItem("pendingProject");

    updateStatus("Launch successful 🚀");

    alert("Launch successful 🚀");

    window.location.href = "project.html";

  } catch (err) {

    console.error(err);

    updateStatus("Launch failed ❌");

    alert("Launch failed: " + err.message);

    btn.disabled = false;
    btn.innerText = "🚀 Confirm Launch";
  }
};

</script>

</body>
</html>
