<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hall of Fame - TrustLaunch</title>
<link rel="stylesheet" href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="launch.html">Launch</a>
  <a href="explore.html">Explore</a>
  <a href="wallet.html">Wallet</a>
  <a href="leaderboard.html">Leaderboard</a>

  <a href="trending.html">Trending</a>
</nav>

<h1>🏛️ TrustLaunch Hall of Fame</h1>

<section>

  <h2>🌟 Greatest Projects Of All Time</h2>

  <div id="hallStats">
    <p>Total Hall Projects: <span id="hallCount">0</span></p>
    <p>Legendary Founders: <span id="legendCount">0</span></p>
  </div>

  <div id="hallOfFame">
    <p>Loading...</p>
  </div>

</section>

<section>

  <h2>👑 Legendary Founders</h2>
  <div id="legendaryFounders">
    <p>Loading...</p>
  </div>

</section>

<section>

  <h2>🏆 Hall Achievements</h2>
  <div id="hallAchievements">
    <p>Loading...</p>
  </div>

</section>

<script>

/* =========================
   SUPABASE SETUP
========================= */

const supabaseUrl = "https://uyuokduxqjghmqypheyi.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5dW9rZHV4cWpnaG1xeXBoZXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDgwMDAsImV4cCI6MjA5NjE4NDAwMH0.1RIJxhyo3Nrjn52qtSP3WTJTDqFT9UayRmaBSUwkZVw"; // replace with real anon key

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

/* =========================
   LOAD PROJECTS
========================= */

async function loadProjects() {

  const { data: projects, error } = await supabase
    .from("launches")
    .select("*");

  if (error) {
    document.getElementById("hallOfFame").innerHTML =
      "<p>Error loading projects</p>";
    return;
  }

  processHallOfFame(projects || []);
}

loadProjects();

/* =========================
   SAFE VALUE HELPERS
========================= */

const num = (v) => Number(v || 0);

function processHallOfFame(projects) {

  /* =========================
     RANK PROJECTS
  ========================= */

  const ranked = projects.map(p => {

    const launchesByCreator =
      projects.filter(x => x.creator_wallet === p.creator_wallet).length;

    const reputation =
      Math.min(100, 50 + launchesByCreator * 10);

    const likes = num(p.likes);
    const views = num(p.views);
    const trust = num(p.trust_score);

    const created = new Date(p.created_at || Date.now());

    const ageDays =
      Math.max(1, (Date.now() - created.getTime()) / 86400000);

    const freshnessBoost =
      ageDays < 3 ? 50 :
      ageDays < 7 ? 20 : 0;

    const score =
      trust +
      reputation +
      (likes * 2) +
      (views * 0.5) +
      freshnessBoost;

    return {
      ...p,
      score,
      reputation,
      launchesByCreator,
      likes,
      views,
      trust
    };
  })
  .sort((a, b) => b.score - a.score)
  .slice(0, 10);

  /* =========================
     HALL OF FAME UI
  ========================= */

  const hall = document.getElementById("hallOfFame");
  hall.innerHTML = "";

  ranked.forEach((p, i) => {

    let medal = "🏅";
    if (i === 0) medal = "🥇";
    if (i === 1) medal = "🥈";
    if (i === 2) medal = "🥉";

    let title = "Elite Project";
    if (p.score > 500) title = "🔥 Immortal";
    else if (p.score > 350) title = "👑 Legendary";
    else if (p.score > 250) title = "🏆 Elite";

    hall.innerHTML += `
      <div>
        <h3>${medal} ${p.token_name}</h3>

        <p><strong>Title:</strong> ${title}</p>
        <p><strong>Symbol:</strong> ${p.token_symbol}</p>
        <p><strong>Rank Score:</strong> ${Math.floor(p.score)}</p>
        <p><strong>Trust Score:</strong> ${p.trust}</p>
        <p><strong>Likes:</strong> ${p.likes}</p>
        <p><strong>Views:</strong> ${p.views}</p>
        <p><strong>Founder Reputation:</strong> ${p.reputation}</p>

        <button onclick='viewProject(${JSON.stringify(p)})'>
          View Project
        </button>

        <hr>
      </div>
    `;
  });

  /* =========================
     FOUNDERS RANKING
  ========================= */

  const foundersMap = {};

  projects.forEach(p => {

    const w = p.creator_wallet;
    if (!w) return;

    if (!foundersMap[w]) {
      foundersMap[w] = {
        wallet: w,
        launches: 0,
        trust: 0
      };
    }

    foundersMap[w].launches++;
    foundersMap[w].trust += num(p.trust_score);
  });

  const founders = Object.values(foundersMap)
    .map(f => {

      const reputation =
        Math.min(100, 50 + f.launches * 10);

      const score =
        f.trust + reputation + (f.launches * 5);

      return { ...f, reputation, score };
    })
    .sort((a, b) => b.score - a.score)
    .slice(0, 10);

  const founderDiv = document.getElementById("legendaryFounders");
  founderDiv.innerHTML = "";

  founders.forEach((f, i) => {

    let badge = "⭐ Founder";
    if (f.launches >= 5) badge = "🏆 Trusted Founder";
    if (f.launches >= 10) badge = "👑 Elite Founder";
    if (f.launches >= 25) badge = "🔥 Legendary Founder";

    founderDiv.innerHTML += `
      <div>
        <h3>#${i + 1} ${badge}</h3>
        <p><strong>Wallet:</strong> ${f.wallet}</p>
        <p><strong>Launches:</strong> ${f.launches}</p>
        <p><strong>Trust Points:</strong> ${Math.floor(f.trust)}</p>
        <p><strong>Reputation:</strong> ${f.reputation}</p>
        <p><strong>Score:</strong> ${Math.floor(f.score)}</p>
        <hr>
      </div>
    `;
  });

  /* =========================
     STATS
  ========================= */

  document.getElementById("hallCount").textContent = ranked.length;
  document.getElementById("legendCount").textContent = founders.length;

  /* =========================
     ACHIEVEMENTS
  ========================= */

  const top = ranked[0];

  document.getElementById("hallAchievements").innerHTML = `
    <p>🥇 Best Project: <strong>${top?.token_name || "N/A"}</strong></p>
    <p>🔥 Highest Score: <strong>${Math.floor(top?.score || 0)}</strong></p>
  `;
}

/* =========================
   VIEW PROJECT
========================= */

function viewProject(project) {
  localStorage.setItem("selectedProject", JSON.stringify(project));
  window.location.href = "project.html";
}

</script>

</body>
</html>
