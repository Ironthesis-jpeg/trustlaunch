<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Launch Token - TrustLaunch</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="launch.html">Launch</a>
  <a href="explore.html">Explore</a>
  <a href="wallet.html">Wallet</a>
  <a href="leaderboard.html">Leaderboard</a>
  <a href="halloffame.html">Hall of Fame</a>
  <a href="trending.html">Trending</a>
</nav>

<h1>🚀 Launch Token</h1>

<form>

<label>Token Name</label><br>
<input
  id="tokenName"
  type="text"
  placeholder="Wolf Coin"
>
<br><br>

<label>Token Symbol</label><br>
<input
  id="tokenSymbol"
  type="text"
  placeholder="WOLF"
>
<br><br>

<label>Project Description</label><br>
<textarea
  id="projectDescription"
  placeholder="Describe your project..."
></textarea>
<br><br>

<label>Website</label><br>
<input
  id="projectWebsite"
  type="text"
  placeholder="https://yourproject.com"
>
<br><br>

<label>X / Twitter</label><br>
<input
  id="projectTwitter"
  type="text"
  placeholder="https://x.com/yourproject"
>
<br><br>

<label>Logo URL</label><br>
<input
  id="projectLogo"
  type="text"
  placeholder="https://..."
>
<br><br>

<label>Category</label><br>
<select id="projectCategory">
  <option>Meme</option>
  <option>DeFi</option>
  <option>Gaming</option>
  <option>AI</option>
  <option>NFT</option>
  <option>Infrastructure</option>
</select>
<br><br>

<label>Launch Type</label><br>
<select id="launchType">
  <option>Meme</option>
  <option>Safe</option>
  <option>Pro</option>
</select>
<br><br>

<label>Total Supply</label><br>
<input
  id="totalSupply"
  type="number"
  placeholder="1000000000"
>
<br>

<p>
Meme: 100B - 1T<br>
Safe: 1B - 1T<br>
Pro: 100M - 100B
</p>

<label>Creator Fee</label><br>
<select id="creatorFee">
  <option>0%</option>
  <option>1%</option>
  <option>2%</option>
</select>

<p>
Creator Fee applies only to buys and sells.<br>
No fee on transfers.
</p>

<button
  type="button"
  onclick="reviewLaunch()"
>
  Review Launch
</button>

</form>

<footer>
  <p>TrustLaunch</p>
  <p>Build trust before hype.</p>
</footer>

<script>

function reviewLaunch() {

  const tokenName =
    document.getElementById("tokenName").value;

  const tokenSymbol =
    document.getElementById("tokenSymbol").value;

  const projectDescription =
    document.getElementById("projectDescription").value;

  const projectWebsite =
    document.getElementById("projectWebsite").value;

  const projectTwitter =
    document.getElementById("projectTwitter").value;

  const projectLogo =
    document.getElementById("projectLogo").value;

  const projectCategory =
    document.getElementById("projectCategory").value;

  const launchType =
    document.getElementById("launchType").value;

  const totalSupply =
    Number(
      document.getElementById("totalSupply").value
    );

  const creatorFee =
    document.getElementById("creatorFee").value;

  if (!tokenName || !tokenSymbol) {

    alert(
      "Token Name and Symbol are required."
    );

    return;

  }

  if (
    launchType === "Meme" &&
    (
      totalSupply < 100000000000 ||
      totalSupply > 1000000000000
    )
  ) {

    alert(
      "Invalid supply for Meme launch."
    );

    return;

  }

  if (
    launchType === "Safe" &&
    (
      totalSupply < 1000000000 ||
      totalSupply > 1000000000000
    )
  ) {

    alert(
      "Invalid supply for Safe launch."
    );

    return;

  }

  if (
    launchType === "Pro" &&
    (
      totalSupply < 100000000 ||
      totalSupply > 100000000000
    )
  ) {

    alert(
      "Invalid supply for Pro launch."
    );

    return;

  }

  let projects =
    JSON.parse(
      localStorage.getItem("projects")
    ) || [];

  const creatorWallet =
    localStorage.getItem("walletAddress");

  const founderLaunches =
    projects.filter(
      p =>
      p.creatorWallet ===
      creatorWallet
    ).length + 1;

  const newProject = {

    tokenName,
    tokenSymbol,
    projectDescription,
    projectWebsite,
    projectTwitter,
    projectLogo,
    projectCategory,
    launchType,
    totalSupply,
    creatorFee,

    trustScore: 100,

    createdAt:
      Date.now(),

    creatorWallet,

    founderLaunches,

    verified: false,

    likes: 0,

    views: 0

  };

  projects.push(
    newProject
  );

  localStorage.setItem(
    "projects",
    JSON.stringify(projects)
  );

  localStorage.setItem(
    "selectedProject",
    JSON.stringify(newProject)
  );

  alert(
    "Project launched successfully!"
  );

  window.location.href =
    "project.html";

}

</script>

</body>
</html>
