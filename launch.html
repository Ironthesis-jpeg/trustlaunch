<!DOCTYPE html><html>
<head>
  <title>Launch Token - TrustLaunch</title>
  <link rel="stylesheet" href="styles.css">
</head><body><nav>
  <a href="index.html">Home</a>
  <a href="launch.html">Launch</a>
  <a href="explore.html">Explore</a>
  <a href="wallet.html">Wallet</a>
</nav><h1>Launch Token</h1><form><label>Token Name</label><br>
<input id="tokenName" type="text" placeholder="Wolf Coin">
<br><br>

<label>Token Symbol</label><br>
<input id="tokenSymbol" type="text" placeholder="WOLF">
<br><br>

<label>Launch Type</label><br>
<select id="launchType">
<option>Meme</option>
<option>Safe</option>
<option>Pro</option>
</select>
<br><br>

<label>Total Supply</label><br>
<input id="totalSupply" type="number" placeholder="1000000000">
<br>

  <p>
    Meme: 100B - 1T<br>
    Safe: 1B - 1T<br>
    Pro: 100M - 100B
  </p><label>Creator Fee</label><br>
<select id="creatorFee">
<option>0%</option>
<option>1%</option>
<option>2%</option>
</select>

  <p>
    Creator Fee applies only to buys and sells.<br>
    No fee on transfers.
  </p>  <button type="button" onclick="reviewLaunch()">
    Review Launch
  </button></form><footer>
  <p>TrustLaunch</p>
  <p>Build trust before hype.</p>
</footer><script>

function reviewLaunch() {

  const tokenName =
    document.getElementById("tokenName").value;

  const tokenSymbol =
    document.getElementById("tokenSymbol").value;

  const launchType =
    document.getElementById("launchType").value;

  const totalSupply =
    Number(document.getElementById("totalSupply").value);

  const creatorFee =
    document.getElementById("creatorFee").value;

  if (
    launchType === "Meme" &&
    (totalSupply < 100000000000 ||
     totalSupply > 1000000000000)
  ) {
    alert(
      "Invalid supply for Meme launch. Allowed range: 100B - 1T"
    );
    return;
  }

  if (
    launchType === "Safe" &&
    (totalSupply < 1000000000 ||
     totalSupply > 1000000000000)
  ) {
    alert(
      "Invalid supply for Safe launch. Allowed range: 1B - 1T"
    );
    return;
  }

  if (
    launchType === "Pro" &&
    (totalSupply < 100000000 ||
     totalSupply > 100000000000)
  ) {
    alert(
      "Invalid supply for Pro launch. Allowed range: 100M - 100B"
    );
    return;
  }

  localStorage.setItem("tokenName", tokenName);
  localStorage.setItem("tokenSymbol", tokenSymbol);
  localStorage.setItem("launchType", launchType);
  localStorage.setItem("totalSupply", totalSupply);
  localStorage.setItem("creatorFee", creatorFee);

  let projects =
    JSON.parse(localStorage.getItem("projects")) || [];

  projects.push({
    tokenName: tokenName,
    tokenSymbol: tokenSymbol,
    launchType: launchType,
    totalSupply: totalSupply,
    creatorFee: creatorFee,
    trustScore: 100,
    createdAt: Date.now()
  });

  localStorage.setItem(
    "projects",
    JSON.stringify(projects)
  );

  window.location.href = "review.html";
}

</script></body>
</html>
