<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Explore Projects - TrustLaunch</title>

<link rel="stylesheet" href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="launch.html">Launch</a>
  <a href="explore.html">Explore</a>
  <a href="wallet.html">Wallet</a>
  <a href="trending.html">Trending</a>
</nav>

<h1>🚀 Explore Projects</h1>

<section>

<input id="searchInput" type="text"
placeholder="Search token name or symbol"
onkeyup="renderProjects()">

<br><br>

<button onclick="setFilter('All')">All</button>
<button onclick="setFilter('Meme')">Meme</button>
<button onclick="setFilter('Safe')">Safe</button>
<button onclick="setFilter('Pro')">Pro</button>

<br><br>

<div id="projectsContainer">
  <p>Loading trending projects...</p>
</div>

</section>

<script>

/* =========================
   SUPABASE SETUP
========================= */

const supabaseUrl = "https://uyuokduxqjghmqypheyi.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5dW9rZHV4cWpnaG1xeXBoZXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDgwMDAsImV4cCI6MjA5NjE4NDAwMH0.1RIJxhyo3Nrjn52qtSP3WTJTDqFT9UayRmaBSUwkZVw";

const supabase = window.supabase.createClient(
  supabaseUrl,
  supabaseKey
);

/* =========================
   STATE
========================= */

let projects = [];
let currentFilter = "All";

/* =========================
   LOAD FROM SUPABASE (TRENDING ORDER)
========================= */

async function loadProjects() {

  const { data, error } = await supabase
    .from("launches")
    .select("*")
    .order("trending_score", { ascending: false });

  if (error) {
    console.log(error);
    document.getElementById("projectsContainer").innerHTML =
      "<p>Error loading projects</p>";
    return;
  }

  projects = data || [];
  renderProjects();
}

/* =========================
   FILTER
========================= */

function setFilter(f) {
  currentFilter = f;
  renderProjects();
}

/* =========================
   VIEW PROJECT
========================= */

function viewProject(p) {
  localStorage.setItem("selectedProject", JSON.stringify(p));
  window.location.href = "project.html";
}

/* =========================
   RENDER
========================= */

function renderProjects() {

  const container = document.getElementById("projectsContainer");
  const search = document.getElementById("searchInput").value.toLowerCase();

  container.innerHTML = "";

  let list = [...projects];

  /* filter */
  list = list.filter(p => {

    const matchesSearch =
      (p.token_name || "").toLowerCase().includes(search) ||
      (p.token_symbol || "").toLowerCase().includes(search);

    const matchesFilter =
      currentFilter === "All" ||
      p.launch_type === currentFilter;

    return matchesSearch && matchesFilter;
  });

  if (list.length === 0) {
    container.innerHTML = "<p>No projects found</p>";
    return;
  }

  list.forEach(p => {

    container.innerHTML += `
      <div>
        <h3>🔥 ${p.token_name}</h3>

        <p><strong>Symbol:</strong> ${p.token_symbol}</p>
        <p><strong>Type:</strong> ${p.launch_type}</p>
        <p><strong>Trust:</strong> ${p.trust_score}</p>
        <p><strong>Trending Score:</strong> ${p.trending_score}</p>
        <p><strong>Creator:</strong> ${p.creator_wallet || "Unknown"}</p>

        <button onclick='viewProject(${JSON.stringify(p)})'>
          View Project
        </button>

        <hr>
      </div>
    `;
  });
}

/* =========================
   INIT
========================= */

loadProjects();

</script>

</body>
</html>
