<!DOCTYPE html><html>
<head>
  <title>Explore Projects - TrustLaunch</title>
  <link rel="stylesheet" href="styles.css">
</head><body><nav>
  <a href="index.html">Home</a>
  <a href="launch.html">Launch</a>
  <a href="explore.html">Explore</a>
  <a href="wallet.html">Wallet</a>
</nav><h1>Explore Projects</h1><section>
  <h2>Community Launches</h2>  <div id="projectsContainer"></div>
</section><footer>
  <p>TrustLaunch</p>
  <p>Build trust before hype.</p>
</footer><script>
const projects =
  JSON.parse(localStorage.getItem("projects")) || [];

const container =
  document.getElementById("projectsContainer");

if (projects.length === 0) {

  container.innerHTML =
    "<p>No projects launched yet.</p>";

} else {

  projects.reverse().forEach(project => {

    container.innerHTML += `
      <div>
        <h3>🚀 ${project.tokenName}</h3>

        <p>Symbol: ${project.tokenSymbol}</p>

        <p>Launch Type: ${project.launchType}</p>

        <p>Trust Score: ${project.trustScore}</p>

        <button onclick='viewProject(${JSON.stringify(project)})'>
          View Project
        </button>

      </div>

      <hr>
    `;

  });

}

function viewProject(project) {

  localStorage.setItem(
    "selectedProject",
    JSON.stringify(project)
  );

  window.location.href = "project.html";
}
</script></body>
</html>
